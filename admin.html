<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iron Fitness | نظام الاشتراكات المتقدم</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- SweetAlert2 للتنبيهات الاحترافية -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #ff3b3b;
            --primary-dark: #cc2e2e;
            --primary-light: #ff6b6b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #0a0a0a;
            --dark-card: #111827;
            --gray: #1f2937;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .header h1 {
            background: linear-gradient(135deg, var(--primary), #ff9f4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #9ca3af;
            font-size: 16px;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 25px;
            background: rgba(17, 24, 39, 0.8);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 59, 59, 0.2);
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 5px;
        }
        
        /* Search Section */
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .search-input {
            flex: 1;
            max-width: 400px;
            padding: 14px 20px;
            background: var(--gray);
            border: 1px solid #374151;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 59, 59, 0.2);
        }
        
        .verify-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 59, 59, 0.4);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: var(--gray);
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .tab-btn:hover:not(.active) {
            background: #374151;
            color: white;
        }
        
        /* Subscriptions Grid */
        .subscriptions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .subscription-card {
            background: rgba(17, 24, 39, 0.95);
            border-radius: 20px;
            padding: 22px;
            border-right: 4px solid var(--primary);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .subscription-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #ff9f4a);
            transform: scaleX(0);
            transition: 0.3s;
        }
        
        .subscription-card:hover::before {
            transform: scaleX(1);
        }
        
        .subscription-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        .subscription-card h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 20px;
        }
        
        .subscription-card p {
            margin: 8px 0;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 10px;
        }
        
        .status-active {
            background: var(--success);
            color: white;
        }
        
        .status-expired {
            background: var(--danger);
            color: white;
        }
        
        .status-warning {
            background: var(--warning);
            color: white;
        }
        
        .badge-cash { background: var(--success); color: white; }
        .badge-card { background: var(--warning); color: white; }
        .badge-bank { background: var(--info); color: white; }
        
        /* Verification Result */
        .verify-result {
            background: rgba(17, 24, 39, 0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
            border-right: 4px solid var(--success);
            animation: slideDown 0.4s ease;
        }
        
        .verify-result.show {
            display: block;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .verify-result h3 {
            color: var(--success);
            margin-bottom: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1f2937;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 25px;
            border-top: 1px solid #333;
            color: #6b7280;
        }
        
        @media (max-width: 768px) {
            .stats-bar { flex-direction: column; }
            .search-box { flex-direction: column; align-items: center; }
            .search-input { max-width: 100%; }
            .subscriptions-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 28px; }
        }
        
        .countdown {
            font-size: 12px;
            color: var(--warning);
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header" data-aos="fade-up">
        <h1><i class="fas fa-dumbbell"></i> IRON FITNESS</h1>
        <p>نظام التحقق من الاشتراكات | متكامل مع Firebase</p>
    </div>
    
    <!-- إحصائيات سريعة -->
    <div class="stats-bar" data-aos="fade-up">
        <div class="stat-item">
            <div class="stat-number" id="totalSubscriptions">0</div>
            <div class="stat-label"><i class="fas fa-users"></i> إجمالي الاشتراكات</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="activeSubscriptions">0</div>
            <div class="stat-label"><i class="fas fa-check-circle"></i> اشتراكات نشطة</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="expiredSubscriptions">0</div>
            <div class="stat-label"><i class="fas fa-clock"></i> منتهية</div>
        </div>
    </div>
    
    <!-- قسم التحقق من الاشتراك -->
    <div class="search-section" data-aos="fade-up">
        <div class="search-box">
            <input type="text" id="searchPhone" class="search-input" placeholder="📱 أدخل رقم الهاتف للتحقق من الاشتراك (مثال: 01012345678)">
            <button class="verify-btn" id="verifyBtn">
                <i class="fas fa-search"></i> تحقق من الاشتراك
            </button>
        </div>
    </div>
    
    <!-- نتيجة التحقق -->
    <div id="verifyResult" class="verify-result"></div>
    
    <!-- تبويبات العرض -->
    <div class="tabs" data-aos="fade-up">
        <button class="tab-btn active" data-tab="all">
            <i class="fas fa-list"></i> الكل
        </button>
        <button class="tab-btn" data-tab="active">
            <i class="fas fa-check-circle"></i> نشطة
        </button>
        <button class="tab-btn" data-tab="expired">
            <i class="fas fa-clock"></i> منتهية
        </button>
    </div>
    
    <!-- قائمة الاشتراكات -->
    <div id="subscriptionsList" class="subscriptions-grid">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل الاشتراكات...</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 IRON FITNESS GYM | نظام متكامل مع Firebase Realtime Database</p>
    <p style="font-size: 12px; margin-top: 8px;">
        <i class="fas fa-shield-alt"></i> نظام آمن | <i class="fas fa-database"></i> تخزين سحابي
    </p>
</footer>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC_V-GXnzvoabdOdPppDYp4WCRjsDgzgkI",
        authDomain: "platform-46177.firebaseapp.com",
        databaseURL: "https://platform-46177-default-rtdb.firebaseio.com",
        projectId: "platform-46177",
        storageBucket: "platform-46177.firebasestorage.app",
        messagingSenderId: "933736879105",
        appId: "1:933736879105:web:13fa2d985214be44881c00"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Global Variables
    let allSubscriptions = [];
    let currentTab = 'all';

    // Initialize AOS
    AOS.init({ duration: 800, once: true });

    // Load Subscriptions
    function loadSubscriptions() {
        database.ref('subscriptions').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data && Object.keys(data).length > 0) {
                allSubscriptions = Object.entries(data).map(([id, sub]) => ({ 
                    ...sub, 
                    id,
                    createdAt: sub.createdAt || new Date().toISOString(),
                    endDate: sub.endDate || calculateEndDate(sub.createdAt, sub.months || 1)
                }));
                
                updateStats();
                filterAndRender();
            } else {
                document.getElementById('subscriptionsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>📭 لا توجد اشتراكات حتى الآن</p>
                        <small>قم بتسجيل أول اشتراك في النظام</small>
                    </div>
                `;
                updateStats();
            }
        });
    }

    // Calculate End Date
    function calculateEndDate(startDate, months) {
        const date = new Date(startDate || new Date());
        date.setMonth(date.getMonth() + months);
        return date.toISOString();
    }

    // Check Subscription Status
    function getSubscriptionStatus(endDate) {
        const now = new Date();
        const end = new Date(endDate);
        const daysLeft = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
        
        if (daysLeft < 0) return { status: 'expired', text: 'منتهي', class: 'status-expired', daysLeft: 0 };
        if (daysLeft <= 7) return { status: 'warning', text: 'ينتهي قريباً', class: 'status-warning', daysLeft: daysLeft };
        return { status: 'active', text: 'نشط', class: 'status-active', daysLeft: daysLeft };
    }

    // Update Statistics
    function updateStats() {
        const active = allSubscriptions.filter(sub => {
            const status = getSubscriptionStatus(sub.endDate);
            return status.status === 'active' || status.status === 'warning';
        }).length;
        
        const expired = allSubscriptions.filter(sub => {
            const status = getSubscriptionStatus(sub.endDate);
            return status.status === 'expired';
        }).length;
        
        document.getElementById('totalSubscriptions').innerText = allSubscriptions.length;
        document.getElementById('activeSubscriptions').innerText = active;
        document.getElementById('expiredSubscriptions').innerText = expired;
    }

    // Filter and Render
    function filterAndRender() {
        let filtered = [...allSubscriptions];
        
        if (currentTab === 'active') {
            filtered = filtered.filter(sub => {
                const status = getSubscriptionStatus(sub.endDate);
                return status.status === 'active' || status.status === 'warning';
            });
        } else if (currentTab === 'expired') {
            filtered = filtered.filter(sub => {
                const status = getSubscriptionStatus(sub.endDate);
                return status.status === 'expired';
            });
        }
        
        renderSubscriptions(filtered);
    }

    // Render Subscriptions
    function renderSubscriptions(subscriptions) {
        const container = document.getElementById('subscriptionsList');
        
        if (!subscriptions || subscriptions.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>📭 لا توجد اشتراكات</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = subscriptions.map(sub => {
            const status = getSubscriptionStatus(sub.endDate);
            
            let paymentBadge = '';
            if (sub.paymentMethod === 'cash') {
                paymentBadge = '<span class="badge-cash" style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;margin-top:10px;"><i class="fas fa-money-bill"></i> كاش</span>';
            } else if (sub.paymentMethod === 'card') {
                paymentBadge = '<span class="badge-card" style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;margin-top:10px;"><i class="fas fa-credit-card"></i> بطاقة</span>';
            } else {
                paymentBadge = '<span class="badge-bank" style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;margin-top:10px;"><i class="fas fa-university"></i> تحويل بنكي</span>';
            }
            
            const dateStr = new Date(sub.createdAt).toLocaleDateString('ar-EG');
            const endDateStr = new Date(sub.endDate).toLocaleDateString('ar-EG');
            const daysLeft = status.daysLeft;
            
            return `
                <div class="subscription-card" data-aos="fade-up">
                    <h3><i class="fas fa-user"></i> ${escapeHtml(sub.userName)}</h3>
                    <p><strong><i class="fas fa-envelope"></i> البريد:</strong> ${escapeHtml(sub.userEmail)}</p>
                    <p><strong><i class="fas fa-phone"></i> الهاتف:</strong> ${escapeHtml(sub.userPhone)}</p>
                    <p><strong><i class="fas fa-dumbbell"></i> المدرب:</strong> ${escapeHtml(sub.trainerName)}</p>
                    <p><strong><i class="fas fa-calendar"></i> المدة:</strong> ${sub.months || 1} شهر</p>
                    <p><strong><i class="fas fa-money-bill-wave"></i> السعر:</strong> ${(sub.totalPrice || 0).toLocaleString()} ج.م</p>
                    <p><strong><i class="fas fa-calendar-check"></i> تاريخ البدء:</strong> ${dateStr}</p>
                    <p><strong><i class="fas fa-calendar-times"></i> تاريخ الانتهاء:</strong> ${endDateStr}</p>
                    <div>
                        <span class="status-badge ${status.class}"><i class="fas ${status.status === 'active' ? 'fa-check-circle' : status.status === 'warning' ? 'fa-exclamation-triangle' : 'fa-times-circle'}"></i> ${status.text}</span>
                        ${paymentBadge}
                    </div>
                    ${daysLeft > 0 ? `<div class="countdown"><i class="fas fa-hourglass-half"></i> متبقي ${daysLeft} يوم</div>` : ''}
                </div>
            `;
        }).join('');
    }

    // Verify Subscription by Phone
    function verifySubscription() {
        const phone = document.getElementById('searchPhone').value.trim();
        const resultDiv = document.getElementById('verifyResult');
        
        if (!phone) {
            Swal.fire('تنبيه', 'الرجاء إدخال رقم الهاتف', 'warning');
            return;
        }
        
        const phoneRegex = /^01[0-9]{9}$/;
        if (!phoneRegex.test(phone)) {
            Swal.fire('تنبيه', 'رقم الهاتف غير صالح (مثال: 01012345678)', 'warning');
            return;
        }
        
        const subscription = allSubscriptions.find(sub => sub.userPhone === phone);
        
        if (subscription) {
            const status = getSubscriptionStatus(subscription.endDate);
            const startDate = new Date(subscription.createdAt).toLocaleDateString('ar-EG');
            const endDate = new Date(subscription.endDate).toLocaleDateString('ar-EG');
            
            let statusIcon = '';
            let statusColor = '';
            if (status.status === 'active') {
                statusIcon = '✅';
                statusColor = '#10b981';
            } else if (status.status === 'warning') {
                statusIcon = '⚠️';
                statusColor = '#f59e0b';
            } else {
                statusIcon = '❌';
                statusColor = '#ef4444';
            }
            
            resultDiv.innerHTML = `
                <h3><i class="fas fa-check-circle"></i> ${statusIcon} نتيجة التحقق</h3>
                <p><strong>👤 الاسم:</strong> ${escapeHtml(subscription.userName)}</p>
                <p><strong>📧 البريد:</strong> ${escapeHtml(subscription.userEmail)}</p>
                <p><strong>🏋️ المدرب:</strong> ${escapeHtml(subscription.trainerName)}</p>
                <p><strong>📅 تاريخ البدء:</strong> ${startDate}</p>
                <p><strong>📅 تاريخ الانتهاء:</strong> ${endDate}</p>
                <p><strong>📊 حالة الاشتراك:</strong> <span style="color: ${statusColor}; font-weight: bold;">${status.text}</span></p>
                ${status.daysLeft > 0 ? `<p><strong>⏰ المتبقي:</strong> ${status.daysLeft} يوم</p>` : ''}
                <hr style="margin: 15px 0; border-color: #333;">
                <p style="color: #9ca3af; font-size: 13px;"><i class="fas fa-shield-alt"></i> هذا تأكيد رسمي من نظام IRON FITNESS</p>
            `;
            resultDiv.classList.add('show');
            
            Swal.fire({
                title: 'تم العثور على الاشتراك',
                html: `الاشتراك <strong>${status.text}</strong> للمستخدم <strong>${subscription.userName}</strong>`,
                icon: status.status === 'expired' ? 'error' : 'success',
                confirmButtonColor: '#ff3b3b'
            });
        } else {
            resultDiv.innerHTML = `
                <h3 style="color: #ef4444;"><i class="fas fa-exclamation-triangle"></i> ❌ لم يتم العثور على اشتراك</h3>
                <p>لا يوجد اشتراك مسجل بهذا الرقم: <strong>${phone}</strong></p>
                <p>يرجى التأكد من الرقم أو التواصل مع الإدارة.</p>
                <hr style="margin: 15px 0; border-color: #333;">
                <p style="color: #9ca3af; font-size: 13px;"><i class="fas fa-headset"></i> للاستفسار: 01098882222</p>
            `;
            resultDiv.classList.add('show');
            
            Swal.fire('غير موجود', `لا يوجد اشتراك مسجل بالرقم ${phone}`, 'error');
        }
        
        // Scroll to result
        resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Escape HTML
    function escapeHtml(text) {
        if (!text) return 'غير محدد';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
        loadSubscriptions();
        
        document.getElementById('verifyBtn')?.addEventListener('click', verifySubscription);
        document.getElementById('searchPhone')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifySubscription();
        });
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                filterAndRender();
            });
        });
    });
</script>
</body>
    </html>
