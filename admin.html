<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم – تسجيل امتحانات الثالثة ثانوي</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font (Cairo) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e2e9f2 0%, #c5d4e4 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .dashboard-wrapper {
      max-width: 1350px;
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 56px;
      padding: 2.5rem 3rem;
      box-shadow: 0 40px 80px -25px rgba(8, 20, 50, 0.35),
                  inset 0 1px 3px rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.6);
    }

    /* header */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .dash-header h1 {
      font-weight: 800;
      font-size: 2.2rem;
      color: #0a1a2e;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .dash-header h1 i {
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      color: white;
      padding: 14px 18px;
      border-radius: 60px;
      font-size: 1.6rem;
      box-shadow: 0 12px 24px -10px rgba(0,20,50,0.3);
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-outline {
      background: rgba(255,255,255,0.7);
      border: 2px solid #1a334b;
      color: #1a334b;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      backdrop-filter: blur(4px);
    }

    .btn-outline:hover {
      background: #1a334b;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -8px rgba(26,51,75,0.3);
    }

    .btn-danger-outline {
      border-color: #b13e4b;
      color: #b13e4b;
    }
    .btn-danger-outline:hover {
      background: #b13e4b;
      color: white;
    }

    /* stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.2rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 1.2rem 1.8rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,20,40,0.08);
    }

    .stat-icon {
      background: linear-gradient(135deg, #e3ebf5, #d0ddee);
      border-radius: 60px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #1a4b74;
    }

    .stat-content h3 {
      font-size: 0.95rem;
      font-weight: 500;
      color: #3a5a77;
    }

    .stat-content .number {
      font-size: 2rem;
      font-weight: 800;
      color: #0a1a2e;
      line-height: 1.2;
    }

    /* filter bar */
    .filter-bar {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
      border-radius: 40px;
      padding: 0.8rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.2rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.9);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-group label {
      font-weight: 600;
      color: #0a1a2e;
      font-size: 0.95rem;
    }

    .filter-group label i {
      margin-left: 8px;
      color: #2a5a7a;
    }

    .filter-group input, .filter-group select {
      padding: 10px 18px;
      border: 2px solid #dce6f0;
      border-radius: 40px;
      background: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      font-weight: 500;
      color: #0a1a2e;
    }

    .filter-group input:focus, .filter-group select:focus {
      border-color: #1a4b74;
      box-shadow: 0 0 0 4px rgba(26,75,116,0.08);
    }

    .btn-filter {
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    .btn-filter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -8px rgba(26,51,75,0.3);
    }

    .btn-filter-outline {
      background: transparent;
      border: 2px solid #b0c8dd;
      color: #3a5a77;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-filter-outline:hover {
      border-color: #1a334b;
      color: #1a334b;
      background: rgba(255,255,255,0.5);
    }

    /* table */
    .table-wrapper {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      border-radius: 36px;
      padding: 0.2rem 0.2rem 0.2rem 0.2rem;
      border: 1px solid rgba(255,255,255,0.9);
      overflow-x: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      min-width: 700px;
    }

    th {
      text-align: right;
      padding: 1.2rem 1.5rem 0.9rem 1.5rem;
      font-weight: 700;
      color: #0a1a2e;
      border-bottom: 2px solid #dce6f0;
      background: rgba(249,252,255,0.6);
      font-size: 0.95rem;
    }

    td {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid #eef3fa;
      vertical-align: middle;
      color: #1a334b;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(245, 250, 255, 0.6);
    }

    .status-badge {
      padding: 5px 18px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
    }

    .status-approved {
      background: #d4edda;
      color: #155724;
      border-color: #8fcaa6;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
      border-color: #ffd970;
    }

    .action-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .action-btns button {
      background: transparent;
      border: 2px solid #dce6f0;
      padding: 6px 14px;
      border-radius: 60px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
      color: #3f6483;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .action-btns .approve-btn {
      color: #1f6d4a;
      border-color: #9fc7b2;
    }
    .action-btns .approve-btn:hover {
      background: #e1f3e9;
      border-color: #5a9a7a;
      transform: scale(1.02);
    }

    .action-btns .delete-btn {
      color: #b1424a;
      border-color: #f0cfd2;
    }
    .action-btns .delete-btn:hover {
      background: #fde7ea;
      border-color: #d48a92;
      transform: scale(1.02);
    }

    .action-btns .revoke-btn {
      color: #b17a42;
      border-color: #f0ddcf;
    }
    .action-btns .revoke-btn:hover {
      background: #fdf0e7;
      border-color: #d4b08a;
      transform: scale(1.02);
    }

    .empty-table {
      text-align: center;
      padding: 3rem 0;
      color: #4e6f8c;
    }

    .empty-table i {
      font-size: 3.5rem;
      opacity: 0.25;
      display: block;
      margin-bottom: 14px;
      color: #1a334b;
    }

    .empty-table p {
      font-weight: 500;
      font-size: 1.05rem;
    }

    /* responsive */
    @media (max-width: 820px) {
      .dashboard-wrapper {
        padding: 1.8rem 1.2rem;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
        padding: 1.2rem 1.5rem;
      }
      .filter-group {
        flex-wrap: wrap;
      }
      .dash-header h1 {
        font-size: 1.6rem;
      }
      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }
      .stat-card {
        padding: 1rem 1.2rem;
      }
      .stat-content .number {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .header-actions {
        width: 100%;
      }
      .header-actions .btn-outline {
        flex: 1;
        justify-content: center;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
      td, th {
        padding: 0.8rem 1rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
<div class="dashboard-wrapper">

  <!-- header -->
  <div class="dash-header">
    <h1><i class="fas fa-sliders-h"></i> لوحة تحكم الحجوزات</h1>
    <div class="header-actions">
      <button class="btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
      <button class="btn-outline btn-danger-outline" id="clearAllBtn"><i class="fas fa-trash-alt"></i> مسح الكل</button>
    </div>
  </div>

  <!-- stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div class="stat-content">
        <h3>إجمالي الطلبات</h3>
        <span class="number" id="totalRequests">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
      <div class="stat-content">
        <h3>مقبولة</h3>
        <span class="number" id="approvedCount">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-clock"></i></div>
      <div class="stat-content">
        <h3>قيد المراجعة</h3>
        <span class="number" id="pendingCount">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
      <div class="stat-content">
        <h3>أقسام</h3>
        <span class="number" id="uniqueMajors">0</span>
      </div>
    </div>
  </div>

  <!-- filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="filterMajor"><i class="fas fa-layer-group"></i> القسم:</label>
      <select id="filterMajor">
        <option value="all">الكل</option>
        <option value="علمي">علمي</option>
        <option value="ادبي">أدبي</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterStatus"><i class="fas fa-filter"></i> الحالة:</label>
      <select id="filterStatus">
        <option value="all">الكل</option>
        <option value="approved">مقبولة</option>
        <option value="pending">قيد المراجعة</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterSubject"><i class="fas fa-book"></i> المادة:</label>
      <select id="filterSubject">
        <option value="all">الكل</option>
        <option value="الرياضيات">الرياضيات</option>
        <option value="الفيزياء">الفيزياء</option>
        <option value="الكيمياء">الكيمياء</option>
        <option value="الأحياء">الأحياء</option>
        <option value="اللغة العربية">اللغة العربية</option>
        <option value="التاريخ">التاريخ</option>
        <option value="الجغرافيا">الجغرافيا</option>
        <option value="الفلسفة">الفلسفة</option>
      </select>
    </div>
    <button class="btn-filter" id="applyFilterBtn"><i class="fas fa-search"></i> تطبيق</button>
    <button class="btn-filter-outline" id="resetFilterBtn"><i class="fas fa-undo-alt"></i> إعادة ضبط</button>
  </div>

  <!-- table -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>اسم الطالب</th>
          <th>الهاتف</th>
          <th>القسم</th>
          <th>المواد</th>
          <th>الحالة</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- يتم عرض البيانات عبر JS -->
      </tbody>
    </table>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ------------------- البيانات (مشاركة مع نظام التسجيل) -------------------
    let requests = [];

    // تحميل البيانات من localStorage إن وجدت
    function loadFromStorage() {
      const stored = localStorage.getItem('examRequests');
      if (stored) {
        try {
          requests = JSON.parse(stored);
        } catch(e) {
          requests = [];
        }
      } else {
        // بيانات نموذجية
        requests = [
          { student: 'أحمد محمد علي', phone: '0555123456', major: 'علمي', subjects: ['الرياضيات', 'الفيزياء'], approved: false },
          { student: 'سارة خالد حسن', phone: '0555987654', major: 'ادبي', subjects: ['اللغة العربية', 'التاريخ'], approved: true },
          { student: 'محمد يوسف رضا', phone: '0555234567', major: 'علمي', subjects: ['الكيمياء', 'الأحياء'], approved: false },
          { student: 'نورا إبراهيم', phone: '0555345678', major: 'ادبي', subjects: ['الفلسفة', 'الجغرافيا'], approved: true },
        ];
        saveToStorage();
      }
    }

    function saveToStorage() {
      localStorage.setItem('examRequests', JSON.stringify(requests));
    }

    // ------------------- عناصر DOM -------------------
    const tbody = document.getElementById('tableBody');
    const totalSpan = document.getElementById('totalRequests');
    const approvedSpan = document.getElementById('approvedCount');
    const pendingSpan = document.getElementById('pendingCount');
    const uniqueMajorsSpan = document.getElementById('uniqueMajors');

    const filterMajor = document.getElementById('filterMajor');
    const filterStatus = document.getElementById('filterStatus');
    const filterSubject = document.getElementById('filterSubject');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const resetFilterBtn = document.getElementById('resetFilterBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // ------------------- دوال الإحصاء -------------------
    function updateStats(data) {
      totalSpan.textContent = data.length;
      const approved = data.filter(r => r.approved === true).length;
      approvedSpan.textContent = approved;
      const pending = data.filter(r => r.approved === false).length;
      pendingSpan.textContent = pending;
      const majors = new Set(data.map(r => r.major));
      uniqueMajorsSpan.textContent = majors.size;
    }

    // ------------------- عرض الجدول -------------------
    function renderTable(data) {
      tbody.innerHTML = '';
      if (!data || data.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="7">
            <div class="empty-table">
              <i class="fas fa-inbox"></i>
              <p>لا توجد طلبات لعرضها</p>
            </div>
          </td></tr>
        `;
        updateStats(data);
        return;
      }

      // ترتيب حسب التاريخ (الأحدث أولاً) – نستخدم رقم عشوائي للترتيب
      const sorted = [...data].reverse();

      sorted.forEach((req, index) => {
        const tr = document.createElement('tr');
        // رقم تسلسلي
        const numTd = document.createElement('td');
        numTd.textContent = index + 1;

        const nameTd = document.createElement('td');
        nameTd.textContent = req.student;
        nameTd.style.fontWeight = '600';

        const phoneTd = document.createElement('td');
        phoneTd.textContent = req.phone;

        const majorTd = document.createElement('td');
        majorTd.textContent = req.major;

        const subjectsTd = document.createElement('td');
        subjectsTd.textContent = req.subjects.join('، ');
        subjectsTd.style.fontSize = '0.9rem';

        // حالة
        const statusTd = document.createElement('td');
        const statusClass = req.approved ? 'status-approved' : 'status-pending';
        const statusText = req.approved ? 'موافق عليه' : 'قيد المراجعة';
        const statusIcon = req.approved ? 'fa-check-circle' : 'fa-clock';
        statusTd.innerHTML = `<span class="status-badge ${statusClass}"><i class="fas ${statusIcon}"></i> ${statusText}</span>`;

        // إجراءات
        const actionTd = document.createElement('td');
        const actionDiv = document.createElement('div');
        actionDiv.className = 'action-btns';

        // زر موافقة (يظهر فقط للطلبات غير المقبولة)
        if (!req.approved) {
          const approveBtn = document.createElement('button');
          approveBtn.className = 'approve-btn';
          approveBtn.innerHTML = '<i class="fas fa-check"></i> قبول';
          approveBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm(`هل توافق على طلب "${req.student}"؟`)) {
              const idx = requests.findIndex(r => 
                r.student === req.student && r.phone === req.phone
              );
              if (idx !== -1) {
                requests[idx].approved = true;
                saveToStorage();
                applyFilters();
              }
            }
          });
          actionDiv.appendChild(approveBtn);
        }

        // زر إلغاء الموافقة (يظهر فقط للمقبولة)
        if (req.approved) {
          const revokeBtn = document.createElement('button');
          revokeBtn.className = 'revoke-btn';
          revokeBtn.innerHTML = '<i class="fas fa-undo-alt"></i> إلغاء';
          revokeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm(`إلغاء الموافقة عن طلب "${req.student}"؟`)) {
              const idx = requests.findIndex(r => 
                r.student === req.student && r.phone === req.phone
              );
              if (idx !== -1) {
                requests[idx].approved = false;
                saveToStorage();
                applyFilters();
              }
            }
          });
          actionDiv.appendChild(revokeBtn);
        }

        // زر حذف
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i> حذف';
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm(`هل تريد حذف طلب "${req.student}"؟`)) {
            const idx = requests.findIndex(r => 
              r.student === req.student && r.phone === req.phone
            );
            if (idx !== -1) {
              requests.splice(idx, 1);
              saveToStorage();
              applyFilters();
            }
          }
        });
        actionDiv.appendChild(deleteBtn);

        actionTd.appendChild(actionDiv);

        tr.appendChild(numTd);
        tr.appendChild(nameTd);
        tr.appendChild(phoneTd);
        tr.appendChild(majorTd);
        tr.appendChild(subjectsTd);
        tr.appendChild(statusTd);
        tr.appendChild(actionTd);

        tbody.appendChild(tr);
      });

      updateStats(data);
    }

    // ------------------- التصفية -------------------
    function getFilteredData() {
      const majorFilter = filterMajor.value;
      const statusFilter = filterStatus.value;
      const subjectFilter = filterSubject.value;

      let filtered = requests;

      if (majorFilter !== 'all') {
        filtered = filtered.filter(r => r.major === majorFilter);
      }

      if (statusFilter !== 'all') {
        const isApproved = statusFilter === 'approved';
        filtered = filtered.filter(r => r.approved === isApproved);
      }

      if (subjectFilter !== 'all') {
        filtered = filtered.filter(r => r.subjects.includes(subjectFilter));
      }

      return filtered;
    }

    function applyFilters() {
      const filtered = getFilteredData();
      renderTable(filtered);
    }

    function resetFilters() {
      filterMajor.value = 'all';
      filterStatus.value = 'all';
      filterSubject.value = 'all';
      applyFilters();
    }

    // ------------------- أحداث -------------------
    applyFilterBtn.addEventListener('click', applyFilters);
    resetFilterBtn.addEventListener('click', resetFilters);

    // عند تغيير الفلاتر يدوياً
    filterMajor.addEventListener('change', applyFilters);
    filterStatus.addEventListener('change', applyFilters);
    filterSubject.addEventListener('change', applyFilters);

    refreshBtn.addEventListener('click', function() {
      loadFromStorage();
      resetFilters();
    });

    clearAllBtn.addEventListener('click', function() {
      if (requests.length === 0) {
        alert('لا توجد طلبات لمسحها.');
        return;
      }
      if (confirm('هل أنت متأكد من مسح جميع الطلبات؟ هذا الإجراء لا يمكن التراجع عنه.')) {
        requests = [];
        saveToStorage();
        applyFilters();
      }
    });

    // ------------------- تهيئة الصفحة -------------------
    loadFromStorage();
    resetFilters();

    // الاستماع للتغييرات من localStorage (إذا تم التحديث من صفحة أخرى)
    window.addEventListener('storage', function(e) {
      if (e.key === 'examRequests') {
        loadFromStorage();
        applyFilters();
      }
    });

    // دالة لتحديث البيانات من الخارج (للتكامل مع نظام التسجيل)
    window.updateRequestsFromStorage = function() {
      loadFromStorage();
      applyFilters();
    };

  })();
</script>
</body>
