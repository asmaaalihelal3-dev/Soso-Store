<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم حجوزات الثالثة ثانوي</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: #eef2f7;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* dashboard container */
    .dashboard {
      max-width: 1300px;
      width: 100%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 2rem 2.5rem;
      box-shadow: 0 25px 45px -15px rgba(0,20,40,0.25);
      border: 1px solid rgba(255,255,255,0.6);
    }

    /* header */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .dash-header h1 {
      font-weight: 700;
      font-size: 2rem;
      color: #0b1f33;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dash-header h1 i {
      background: #1a334b;
      color: white;
      padding: 12px 16px;
      border-radius: 60px;
      font-size: 1.5rem;
    }

    .header-actions {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #1a334b;
      color: #1a334b;
      padding: 10px 22px;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }

    .btn-outline:hover {
      background: #1a334b;
      color: white;
    }

    .btn-danger-outline {
      border-color: #b13e4b;
      color: #b13e4b;
    }
    .btn-danger-outline:hover {
      background: #b13e4b;
      color: white;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2.2rem;
    }

    .stat-card {
      background: white;
      border-radius: 28px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      border: 1px solid #e7eef8;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      background: #e3ebf5;
      border-radius: 60px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #1a4b74;
    }

    .stat-content h3 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #3f5f7a;
    }

    .stat-content .number {
      font-size: 1.9rem;
      font-weight: 700;
      color: #0b1f33;
    }

    /* filter bar */
    .filter-bar {
      background: white;
      border-radius: 40px;
      padding: 0.8rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.2rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid #dce5f0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-group label {
      font-weight: 500;
      color: #1f3f5a;
      font-size: 0.95rem;
    }

    .filter-group input, .filter-group select {
      padding: 8px 16px;
      border: 1px solid #ccd9e8;
      border-radius: 40px;
      background: #f8fafc;
      font-size: 0.95rem;
      outline: none;
      transition: 0.15s;
    }

    .filter-group input:focus, .filter-group select:focus {
      border-color: #1a4b74;
      box-shadow: 0 0 0 3px rgba(26,75,116,0.08);
    }

    .btn-filter {
      background: #1a334b;
      color: white;
      border: none;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.15s;
    }

    .btn-filter:hover {
      background: #0f2338;
    }

    /* table */
    .table-wrapper {
      background: white;
      border-radius: 32px;
      padding: 0.2rem 0.2rem 0.2rem 0.2rem;
      border: 1px solid #e2eaf3;
      overflow-x: auto;
      box-shadow: 0 8px 18px rgba(0,0,0,0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      min-width: 600px;
    }

    th {
      text-align: right;
      padding: 1.2rem 1.2rem 0.9rem 1.2rem;
      font-weight: 600;
      color: #1a334b;
      border-bottom: 2px solid #e7eef8;
      background: #f9fcff;
    }

    td {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #edf3fa;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #f7faff;
    }

    .status-badge {
      background: #e0ecf7;
      padding: 4px 14px;
      border-radius: 60px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1a4b74;
      display: inline-block;
    }

    .status-badge i {
      margin-left: 6px;
    }

    .action-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .action-btns button {
      background: transparent;
      border: none;
      padding: 6px 10px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.1s;
      color: #3f6483;
    }

    .action-btns .edit-btn:hover {
      background: #e1edf7;
      color: #1d4d73;
    }

    .action-btns .delete-btn {
      color: #b1424a;
    }
    .action-btns .delete-btn:hover {
      background: #fde7ea;
      color: #9e2d38;
    }

    .empty-table {
      text-align: center;
      padding: 2.5rem 0;
      color: #4e6f8c;
    }

    .empty-table i {
      font-size: 2.8rem;
      opacity: 0.3;
      display: block;
      margin-bottom: 12px;
    }

    /* responsive */
    @media (max-width: 760px) {
      .dashboard {
        padding: 1.5rem 1rem;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
        padding: 1rem 1.2rem;
      }
      .filter-group {
        flex-wrap: wrap;
      }
      .dash-header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">

  <!-- header -->
  <div class="dash-header">
    <h1><i class="fas fa-sliders-h"></i> لوحة تحكم الحجوزات</h1>
    <div class="header-actions">
      <button class="btn-outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
      <button class="btn-outline btn-danger-outline" id="clearAllBtn"><i class="fas fa-trash-alt"></i> مسح الكل</button>
    </div>
  </div>

  <!-- stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-users"></i></div>
      <div class="stat-content">
        <h3>إجمالي الحجوزات</h3>
        <span class="number" id="totalBookings">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-book"></i></div>
      <div class="stat-content">
        <h3>مواد مختلفة</h3>
        <span class="number" id="uniqueSubjects">0</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
      <div class="stat-content">
        <h3>أيام الامتحانات</h3>
        <span class="number" id="uniqueDates">0</span>
      </div>
    </div>
  </div>

  <!-- filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="filterSubject"><i class="fas fa-filter"></i> المادة:</label>
      <select id="filterSubject">
        <option value="all">الكل</option>
        <option value="اللغة العربية">اللغة العربية</option>
        <option value="اللغة الإنجليزية">اللغة الإنجليزية</option>
        <option value="الرياضيات">الرياضيات</option>
        <option value="الفيزياء">الفيزياء</option>
        <option value="الكيمياء">الكيمياء</option>
        <option value="الأحياء">الأحياء</option>
        <option value="التاريخ">التاريخ</option>
        <option value="الجغرافيا">الجغرافيا</option>
        <option value="الفلسفة">الفلسفة</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filterDate"><i class="fas fa-calendar-day"></i> التاريخ:</label>
      <input type="date" id="filterDate">
    </div>
    <button class="btn-filter" id="applyFilterBtn"><i class="fas fa-search"></i> تطبيق</button>
    <button class="btn-outline" id="resetFilterBtn" style="border-color: #b0c4d8; color: #3f5f7a;"><i class="fas fa-undo-alt"></i> إعادة ضبط</button>
  </div>

  <!-- table -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>اسم الطالب</th>
          <th>المادة</th>
          <th>التاريخ</th>
          <th>الحالة</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- سيتم عرض البيانات عبر JS -->
      </tbody>
    </table>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ------------------- البيانات (مشاركة مع نظام الحجز) -------------------
    // في حالة وجود بيانات سابقة في localStorage نستعيدها، وإلا نستخدم البيانات النموذجية.
    let bookings = [];

    // تحميل البيانات من localStorage إن وجدت
    function loadFromStorage() {
      const stored = localStorage.getItem('examBookings');
      if (stored) {
        try {
          bookings = JSON.parse(stored);
        } catch(e) {
          bookings = [];
        }
      } else {
        // بيانات نموذجية
        bookings = [
          { student: 'أحمد محمد علي', subject: 'الرياضيات', date: '2026-06-22' },
          { student: 'سارة خالد حسن', subject: 'الفيزياء', date: '2026-06-24' },
          { student: 'محمد يوسف رضا', subject: 'اللغة العربية', date: '2026-06-27' },
          { student: 'نورا إبراهيم', subject: 'الكيمياء', date: '2026-06-29' },
          { student: 'عمر سامي', subject: 'الأحياء', date: '2026-07-02' },
        ];
        saveToStorage();
      }
    }

    function saveToStorage() {
      localStorage.setItem('examBookings', JSON.stringify(bookings));
    }

    // ------------------- عناصر DOM -------------------
    const tbody = document.getElementById('tableBody');
    const totalSpan = document.getElementById('totalBookings');
    const uniqueSubjectsSpan = document.getElementById('uniqueSubjects');
    const uniqueDatesSpan = document.getElementById('uniqueDates');

    const filterSubject = document.getElementById('filterSubject');
    const filterDate = document.getElementById('filterDate');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const resetFilterBtn = document.getElementById('resetFilterBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    // ------------------- دوال الإحصاء -------------------
    function updateStats(data) {
      totalSpan.textContent = data.length;
      const subjects = new Set(data.map(b => b.subject));
      uniqueSubjectsSpan.textContent = subjects.size;
      const dates = new Set(data.map(b => b.date));
      uniqueDatesSpan.textContent = dates.size;
    }

    // ------------------- عرض الجدول -------------------
    function renderTable(data) {
      tbody.innerHTML = '';
      if (!data || data.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="6">
            <div class="empty-table">
              <i class="fas fa-inbox"></i>
              <p>لا توجد حجوزات لعرضها</p>
            </div>
          </td></tr>
        `;
        updateStats(data);
        return;
      }

      // ترتيب حسب التاريخ (الأحدث أولاً)
      const sorted = [...data].sort((a,b) => new Date(b.date) - new Date(a.date));

      sorted.forEach((booking, index) => {
        const tr = document.createElement('tr');
        // رقم تسلسلي
        const numTd = document.createElement('td');
        numTd.textContent = index + 1;

        const nameTd = document.createElement('td');
        nameTd.textContent = booking.student;

        const subjectTd = document.createElement('td');
        subjectTd.textContent = booking.subject;

        const dateTd = document.createElement('td');
        dateTd.textContent = booking.date;

        // حالة (دائماً مؤكد)
        const statusTd = document.createElement('td');
        statusTd.innerHTML = `<span class="status-badge"><i class="fas fa-check-circle"></i> مؤكد</span>`;

        // إجراءات
        const actionTd = document.createElement('td');
        const actionDiv = document.createElement('div');
        actionDiv.className = 'action-btns';

        // زر تعديل (يحمل البيانات إلى واجهة الحجز - لكن هنا نوجه رسالة)
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerHTML = '<i class="fas fa-pen"></i>';
        editBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          alert(`تعديل الحجز: يمكنك استخدام نموذج الحجز الرئيسي لتعديل بيانات "${booking.student}".\n(في التطبيق الكامل يتم ربطه تلقائياً)`);
          // يمكننا فتح نموذج الحجز في صفحة منفصلة، لكن نكتفي بتنبيه.
        });

        // زر حذف
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm(`هل تريد حذف حجز "${booking.student}" (${booking.subject})؟`)) {
            // حذف من المصفوفة
            const idx = bookings.findIndex(b => 
              b.student === booking.student && b.subject === booking.subject && b.date === booking.date
            );
            if (idx !== -1) {
              bookings.splice(idx, 1);
              saveToStorage();
              applyFilters(); // إعادة التصفية والعرض
            }
          }
        });

        actionDiv.appendChild(editBtn);
        actionDiv.appendChild(deleteBtn);
        actionTd.appendChild(actionDiv);

        tr.appendChild(numTd);
        tr.appendChild(nameTd);
        tr.appendChild(subjectTd);
        tr.appendChild(dateTd);
        tr.appendChild(statusTd);
        tr.appendChild(actionTd);

        tbody.appendChild(tr);
      });

      updateStats(data);
    }

    // ------------------- التصفية -------------------
    function getFilteredData() {
      const subjectFilter = filterSubject.value;
      const dateFilter = filterDate.value;

      let filtered = bookings;

      if (subjectFilter !== 'all') {
        filtered = filtered.filter(b => b.subject === subjectFilter);
      }

      if (dateFilter !== '') {
        filtered = filtered.filter(b => b.date === dateFilter);
      }

      return filtered;
    }

    function applyFilters() {
      const filtered = getFilteredData();
      renderTable(filtered);
    }

    function resetFilters() {
      filterSubject.value = 'all';
      filterDate.value = '';
      applyFilters();
    }

    // ------------------- أحداث -------------------
    applyFilterBtn.addEventListener('click', applyFilters);
    resetFilterBtn.addEventListener('click', resetFilters);

    refreshBtn.addEventListener('click', function() {
      loadFromStorage();
      resetFilters();
    });

    clearAllBtn.addEventListener('click', function() {
      if (bookings.length === 0) {
        alert('لا توجد حجوزات لمسحها.');
        return;
      }
      if (confirm('هل أنت متأكد من مسح جميع الحجوزات؟ هذا الإجراء لا يمكن التراجع عنه.')) {
        bookings = [];
        saveToStorage();
        applyFilters();
      }
    });

    // عند تغيير الفلاتر يدوياً (اختياري)
    filterSubject.addEventListener('change', applyFilters);
    filterDate.addEventListener('change', applyFilters);

    // ------------------- تهيئة الصفحة -------------------
    loadFromStorage();
    // تعيين تاريخ اليوم كافتراضي للفلتر (اختياري)
    // resetFilters يعيد ضبط الفلتر ويعرض الكل
    resetFilters();

    // ربط خارجي: يمكن استدعاء هذه الدالة من نظام الحجز الرئيسي لتحديث البيانات.
    // للتوافق مع الكود السابق، نعرض البيانات من localStorage.
    window.updateBookingsFromStorage = function() {
      loadFromStorage();
      applyFilters();
    };

    // إذا تم تحديث البيانات من نموذج الحجز، نعكسها هنا.
    // نستمع لأي تغيير في localStorage (حدث من صفحة أخرى)
    window.addEventListener('storage', function(e) {
      if (e.key === 'examBookings') {
        loadFromStorage();
        applyFilters();
      }
    });

  })();
</script>
</body>
  </html>
