<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iron Fitness | نظام إدارة الطلبات</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #ff3b3b;
            --primary-dark: #cc2e2e;
            --primary-light: #ff6b6b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #0a0a0a;
            --dark-card: #111827;
            --gray: #1f2937;
        }
        
        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .header h1 {
            background: linear-gradient(135deg, var(--primary), #ff9f4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 42px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #9ca3af;
            font-size: 16px;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 25px;
            background: rgba(17, 24, 39, 0.8);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 59, 59, 0.2);
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 5px;
        }
        
        /* Trainer Select Modal */
        .trainer-select-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .trainer-select-modal.active {
            display: flex;
        }
        
        .trainer-select-content {
            background: var(--dark-card);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--primary);
        }
        
        .trainer-select-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .trainer-select-content select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background: var(--gray);
            border: 1px solid var(--light-gray);
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        
        /* Trainer Panel Button */
        .trainer-panel-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 59, 59, 0.4);
            border: none;
        }
        
        .trainer-panel-btn:hover {
            transform: scale(1.1);
        }
        
        /* Trainer Modal */
        .trainer-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .trainer-modal.active {
            display: flex;
        }
        
        .trainer-modal-content {
            background: var(--dark-card);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            text-align: center;
            border: 1px solid var(--primary);
        }
        
        .trainer-modal-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .trainer-requests {
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
        }
        
        .request-item {
            background: var(--gray);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            text-align: right;
        }
        
        .request-item p {
            margin: 5px 0;
            font-size: 13px;
        }
        
        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .approve-btn, .reject-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .approve-btn {
            background: var(--success);
            color: white;
        }
        
        .reject-btn {
            background: var(--danger);
            color: white;
        }
        
        .approve-btn:hover, .reject-btn:hover {
            opacity: 0.8;
            transform: scale(0.98);
        }
        
        .close-trainer-btn {
            background: #374151;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            border: none;
        }
        
        /* Subscriptions Grid */
        .subscriptions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .subscription-card {
            background: rgba(17, 24, 39, 0.95);
            border-radius: 20px;
            padding: 22px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .subscription-card.pending {
            border-right: 4px solid var(--warning);
        }
        
        .subscription-card.approved {
            border-right: 4px solid var(--success);
        }
        
        .subscription-card.rejected {
            border-right: 4px solid var(--danger);
            opacity: 0.7;
        }
        
        .subscription-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #ff9f4a);
            transform: scaleX(0);
            transition: 0.3s;
        }
        
        .subscription-card:hover::before {
            transform: scaleX(1);
        }
        
        .subscription-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        
        .subscription-card h3 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 20px;
        }
        
        .subscription-card p {
            margin: 8px 0;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 10px;
        }
        
        .status-pending {
            background: var(--warning);
            color: white;
        }
        
        .status-approved {
            background: var(--success);
            color: white;
        }
        
        .status-rejected {
            background: var(--danger);
            color: white;
        }
        
        .badge-cash { background: var(--success); color: white; display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; margin-top: 5px; }
        .badge-card { background: var(--warning); color: white; display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; margin-top: 5px; }
        .badge-bank { background: var(--info); color: white; display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; margin-top: 5px; }
        
        .countdown {
            font-size: 12px;
            color: var(--warning);
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1f2937;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6b7280;
        }
        
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 25px;
            border-top: 1px solid #333;
            color: #6b7280;
        }
        
        /* نموذج الاشتراك */
        .subscription-form {
            background: rgba(17, 24, 39, 0.95);
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 50px;
            border: 1px solid rgba(255, 59, 59, 0.2);
        }
        
        .form-title {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #9ca3af;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: var(--gray);
            border: 1px solid #374151;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(255, 59, 59, 0.2);
        }
        
        .price-preview {
            background: rgba(255, 59, 59, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            border: 1px dashed var(--primary);
        }
        
        .price-preview .amount {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 59, 59, 0.4);
        }
        
        .trainer-card {
            background: linear-gradient(145deg, var(--dark-card), #0f1117);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255, 59, 59, 0.2);
            cursor: pointer;
        }
        
        .trainer-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        
        .trainer-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 10px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        @media (max-width: 768px) {
            .stats-bar { flex-direction: column; }
            .subscriptions-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header" data-aos="fade-up">
        <h1><i class="fas fa-dumbbell"></i> IRON FITNESS</h1>
        <p>نظام إدارة الطلبات | كل مدرب يقبل طلباته الخاصة</p>
    </div>
    
    <!-- إحصائيات سريعة -->
    <div class="stats-bar" data-aos="fade-up">
        <div class="stat-item">
            <div class="stat-number" id="totalSubscriptions">0</div>
            <div class="stat-label"><i class="fas fa-users"></i> إجمالي الطلبات</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="pendingSubscriptions">0</div>
            <div class="stat-label"><i class="fas fa-hourglass-half"></i> قيد المراجعة</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="approvedSubscriptions">0</div>
            <div class="stat-label"><i class="fas fa-check-circle"></i> تم القبول</div>
        </div>
    </div>
    
    <!-- المدربين -->
    <h2 class="section-title" data-aos="fade-up">💪 المدربين</h2>
    <div class="grid-3" id="trainersContainer"></div>
    
    <!-- نموذج الاشتراك -->
    <div class="subscription-form" data-aos="fade-up">
        <h2 class="form-title"><i class="fas fa-edit"></i> نموذج طلب اشتراك جديد</h2>
        <div class="form-group">
            <label><i class="fas fa-user"></i> الاسم الكامل:</label>
            <input type="text" id="userName" placeholder="مثال: أحمد محمد علي">
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني:</label>
            <input type="email" id="userEmail" placeholder="ahmed@example.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-phone"></i> رقم الهاتف:</label>
            <input type="tel" id="userPhone" placeholder="010XXXXXXXX">
        </div>
        <div class="form-group">
            <label><i class="fas fa-dumbbell"></i> اختر المدرب:</label>
            <select id="trainerSelect">
                <option value="">-- جاري تحميل المدربين --</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-calendar"></i> عدد الأشهر:</label>
            <select id="monthsSelect">
                <option value="1">📅 شهر واحد - 0% خصم</option>
                <option value="3">📅 3 أشهر - 🔥 خصم 5%</option>
                <option value="6">📅 6 أشهر - 🔥 خصم 10%</option>
                <option value="12">📅 12 شهر - 🔥 خصم 15%</option>
            </select>
        </div>
        <div class="form-group">
            <label><i class="fas fa-credit-card"></i> طريقة الدفع:</label>
            <select id="paymentMethod">
                <option value="cash">💰 دفع كاش</option>
                <option value="card">💳 بطاقة ائتمان</option>
                <option value="bank">🏦 تحويل بنكي</option>
            </select>
        </div>
        
        <div class="price-preview" id="pricePreview">
            <div class="amount" id="previewAmount">0 ج.م</div>
            <div class="discount" id="previewDiscount"></div>
        </div>
        
        <button class="submit-btn" id="subscribeBtn">
            <i class="fas fa-paper-plane"></i> إرسال طلب الاشتراك
        </button>
        <div id="subscriptionResult" class="result-card" style="display: none; margin-top: 15px; padding: 15px; background: var(--gray); border-radius: 12px;"></div>
    </div>
    
    <!-- قائمة الطلبات -->
    <div id="subscriptionsList" class="subscriptions-grid">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل الطلبات...</p>
        </div>
    </div>
</div>

<!-- زر لوحة المدرب -->
<button class="trainer-panel-btn" id="trainerPanelBtn">
    <i class="fas fa-chalkboard-user"></i>
</button>

<!-- نافذة اختيار المدرب -->
<div id="trainerSelectModal" class="trainer-select-modal">
    <div class="trainer-select-content">
        <h2><i class="fas fa-dumbbell"></i> اختر حسابك كمدرب</h2>
        <select id="trainerSelectLogin">
            <option value="">-- اختر اسمك --</option>
        </select>
        <button class="approve-btn" id="confirmTrainerBtn" style="width:100%; margin-top:10px;">دخول كلوحة التحكم</button>
        <button class="close-trainer-btn" id="closeSelectModal" style="margin-top:10px;">إلغاء</button>
    </div>
</div>

<!-- لوحة تحكم المدرب -->
<div id="trainerModal" class="trainer-modal">
    <div class="trainer-modal-content">
        <h2 id="trainerNameTitle"><i class="fas fa-chalkboard-user"></i> لوحة تحكم المدرب</h2>
        <div id="trainerRequestsList" class="trainer-requests"></div>
        <button class="close-trainer-btn" id="closeTrainerModal">إغلاق</button>
    </div>
</div>

<footer>
    <p>© 2025 IRON FITNESS GYM | نظام إدارة الطلبات - كل مدرب يدير طلباته</p>
</footer>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC_V-GXnzvoabdOdPppDYp4WCRjsDgzgkI",
        authDomain: "platform-46177.firebaseapp.com",
        databaseURL: "https://platform-46177-default-rtdb.firebaseio.com",
        projectId: "platform-46177",
        storageBucket: "platform-46177.firebasestorage.app",
        messagingSenderId: "933736879105",
        appId: "1:933736879105:web:13fa2d985214be44881c00"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Global Variables
    let allSubscriptions = [];
    let trainersList = [];
    let currentTrainerId = null;
    let currentTrainerName = null;

    // Initialize AOS
    AOS.init({ duration: 800, once: true });

    // Load Trainers
    function loadTrainers() {
        database.ref('trainers').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Object.keys(data).length > 0) {
                trainersList = Object.entries(data).map(([id, t]) => ({ ...t, id, firebaseId: id }));
            } else {
                trainersList = [
                    { id: 1, name: "محمود عبدالله", specialty: "تضخيم وكمال أجسام", pricePerMonth: 1500, image: "https://randomuser.me/api/portraits/men/32.jpg", firebaseId: "1" },
                    { id: 2, name: "سارة خالد", specialty: "تخسيس وتغذية", pricePerMonth: 1700, image: "https://randomuser.me/api/portraits/women/68.jpg", firebaseId: "2" },
                    { id: 3, name: "أحمد رجب", specialty: "كروس فيت", pricePerMonth: 1800, image: "https://randomuser.me/api/portraits/men/45.jpg", firebaseId: "3" },
                    { id: 4, name: "نور الهدى", specialty: "يوجا وتأمل", pricePerMonth: 1400, image: "https://randomuser.me/api/portraits/women/22.jpg", firebaseId: "4" },
                    { id: 5, name: "كريم وائل", specialty: "بطل كمال أجسام", pricePerMonth: 2000, image: "https://randomuser.me/api/portraits/men/15.jpg", firebaseId: "5" }
                ];
            }
            renderTrainers(trainersList);
            updateTrainerSelect();
            updateTrainerLoginSelect();
        });
    }

    function renderTrainers(trainers) {
        const container = document.getElementById('trainersContainer');
        container.innerHTML = trainers.map(trainer => `
            <div class="trainer-card" onclick="selectTrainer('${trainer.firebaseId}')">
                <img src="${trainer.image}" class="trainer-img" onerror="this.src='https://placehold.co/100x100/333/ff3b3b?text=PT'">
                <h3 style="color: var(--primary);">${trainer.name}</h3>
                <p>${trainer.specialty}</p>
                <div class="price-preview" style="margin-top: 10px; padding: 8px;">
                    <span>💰 ${trainer.pricePerMonth.toLocaleString()} ج.م/شهر</span>
                </div>
            </div>
        `).join('');
    }

    function updateTrainerSelect() {
        const select = document.getElementById('trainerSelect');
        if (select && trainersList.length) {
            select.innerHTML = '<option value="">-- اختر مدرب --</option>' + 
                trainersList.map(t => `<option value="${t.firebaseId}">${t.name} - ${t.pricePerMonth.toLocaleString()} ج.م/شهر</option>`).join('');
        }
    }

    function updateTrainerLoginSelect() {
        const select = document.getElementById('trainerSelectLogin');
        if (select && trainersList.length) {
            select.innerHTML = '<option value="">-- اختر اسمك --</option>' + 
                trainersList.map(t => `<option value="${t.firebaseId}">${t.name}</option>`).join('');
        }
    }

    window.selectTrainer = function(trainerId) {
        const select = document.getElementById('trainerSelect');
        if (select) {
            select.value = trainerId;
            updatePricePreview();
            document.querySelector('.subscription-form').scrollIntoView({ behavior: 'smooth' });
            Swal.fire({
                title: 'تم الاختيار!',
                text: `لقد اخترت المدرب ${trainersList.find(t => t.firebaseId == trainerId)?.name}`,
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        }
    };

    function calculatePrice(monthlyPrice, months) {
        let discount = months === 3 ? 0.05 : months === 6 ? 0.10 : months === 12 ? 0.15 : 0;
        let total = monthlyPrice * months;
        total = total - (total * discount);
        return Math.round(total);
    }

    function updatePricePreview() {
        const trainerId = document.getElementById('trainerSelect')?.value;
        const months = parseInt(document.getElementById('monthsSelect')?.value || 1);
        
        if (trainerId && trainersList.length) {
            const trainer = trainersList.find(t => t.firebaseId == trainerId);
            if (trainer) {
                const total = calculatePrice(trainer.pricePerMonth, months);
                let discountText = "";
                if (months === 3) discountText = "✅ خصم 5%";
                else if (months === 6) discountText = "✅ خصم 10%";
                else if (months === 12) discountText = "✅ خصم 15%";
                else discountText = "💰 بدون خصم";
                
                document.getElementById('previewAmount').innerHTML = total.toLocaleString() + ' ج.م';
                document.getElementById('previewDiscount').innerHTML = discountText;
                return;
            }
        }
        document.getElementById('previewAmount').innerHTML = '0 ج.م';
        document.getElementById('previewDiscount').innerHTML = 'اختر مدرب أولاً';
    }

    function calculateEndDate(startDate, months) {
        const date = new Date(startDate || new Date());
        date.setMonth(date.getMonth() + months);
        return date.toISOString();
    }

    function getDaysLeft(endDate) {
        const now = new Date();
        const end = new Date(endDate);
        return Math.ceil((end - now) / (1000 * 60 * 60 * 24));
    }

    // Load Subscriptions
    function loadSubscriptions() {
        database.ref('subscriptions').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data && Object.keys(data).length > 0) {
                allSubscriptions = Object.entries(data).map(([id, sub]) => ({ 
                    ...sub, 
                    id,
                    createdAt: sub.createdAt || new Date().toISOString(),
                    endDate: sub.endDate || calculateEndDate(sub.createdAt, sub.months || 1)
                }));
                
                updateStats();
                sortAndRender();
            } else {
                document.getElementById('subscriptionsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>📭 لا توجد طلبات حتى الآن</p>
                        <small>قم بتسجيل أول طلب في النظام</small>
                    </div>
                `;
                updateStats();
            }
        });
    }

    function updateStats() {
        const pending = allSubscriptions.filter(sub => sub.status === 'pending').length;
        const approved = allSubscriptions.filter(sub => sub.status === 'approved').length;
        
        document.getElementById('totalSubscriptions').innerText = allSubscriptions.length;
        document.getElementById('pendingSubscriptions').innerText = pending;
        document.getElementById('approvedSubscriptions').innerText = approved;
    }

    function sortAndRender() {
        const sorted = [...allSubscriptions].sort((a, b) => {
            if (a.status === 'rejected' && b.status !== 'rejected') return 1;
            if (b.status === 'rejected' && a.status !== 'rejected') return -1;
            if (a.status === 'pending' && b.status === 'approved') return 1;
            if (b.status === 'pending' && a.status === 'approved') return -1;
            if (a.status === 'approved' && b.status === 'approved') {
                const daysA = getDaysLeft(a.endDate);
                const daysB = getDaysLeft(b.endDate);
                return daysA - daysB;
            }
            if (a.status === 'pending' && b.status === 'pending') {
                return new Date(b.createdAt) - new Date(a.createdAt);
            }
            return 0;
        });
        
        renderSubscriptions(sorted);
    }

    function renderSubscriptions(subscriptions) {
        const container = document.getElementById('subscriptionsList');
        
        if (!subscriptions || subscriptions.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>📭 لا توجد طلبات</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = subscriptions.map(sub => {
            let paymentBadge = '';
            let statusBadge = '';
            let statusClass = '';
            
            if (sub.paymentMethod === 'cash') {
                paymentBadge = '<span class="badge-cash"><i class="fas fa-money-bill"></i> كاش</span>';
            } else if (sub.paymentMethod === 'card') {
                paymentBadge = '<span class="badge-card"><i class="fas fa-credit-card"></i> بطاقة</span>';
            } else {
                paymentBadge = '<span class="badge-bank"><i class="fas fa-university"></i> تحويل بنكي</span>';
            }
            
            if (sub.status === 'pending') {
                statusBadge = '<span class="status-badge status-pending"><i class="fas fa-hourglass-half"></i> ⏳ قيد المراجعة</span>';
                statusClass = 'pending';
            } else if (sub.status === 'approved') {
                const daysLeft = getDaysLeft(sub.endDate);
                statusBadge = `<span class="status-badge status-approved"><i class="fas fa-check-circle"></i> ✅ تم القبول</span>`;
                statusClass = 'approved';
            } else {
                statusBadge = '<span class="status-badge status-rejected"><i class="fas fa-times-circle"></i> ❌ مرفوض</span>';
                statusClass = 'rejected';
            }
            
            const dateStr = new Date(sub.createdAt).toLocaleDateString('ar-EG');
            const daysLeft = getDaysLeft(sub.endDate);
            
            return `
                <div class="subscription-card ${statusClass}" data-aos="fade-up">
                    <h3><i class="fas fa-user"></i> ${escapeHtml(sub.userName)}</h3>
                    <p><strong><i class="fas fa-envelope"></i> البريد:</strong> ${escapeHtml(sub.userEmail)}</p>
                    <p><strong><i class="fas fa-phone"></i> الهاتف:</strong> ${escapeHtml(sub.userPhone)}</p>
                    <p><strong><i class="fas fa-dumbbell"></i> المدرب:</strong> ${escapeHtml(sub.trainerName)}</p>
                    <p><strong><i class="fas fa-calendar"></i> المدة:</strong> ${sub.months || 1} شهر</p>
                    <p><strong><i class="fas fa-money-bill-wave"></i> السعر:</strong> ${(sub.totalPrice || 0).toLocaleString()} ج.م</p>
                    <p><strong><i class="fas fa-calendar-check"></i> تاريخ الطلب:</strong> ${dateStr}</p>
                    ${sub.status === 'approved' ? `<p><strong><i class="fas fa-calendar-times"></i> تاريخ الانتهاء:</strong> ${new Date(sub.endDate).toLocaleDateString('ar-EG')}</p>` : ''}
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;">
                        ${statusBadge}
                        ${paymentBadge}
                    </div>
                    ${sub.status === 'approved' && daysLeft > 0 ? `<div class="countdown"><i class="fas fa-hourglass-half"></i> متبقي ${daysLeft} يوم</div>` : ''}
                    ${sub.status === 'pending' ? `<div class="countdown" style="color:#f59e0b;"><i class="fas fa-clock"></i> جاري انتظار موافقة المدرب...</div>` : ''}
                </div>
            `;
        }).join('');
    }

    // Handle Subscription
    async function handleSubscription() {
        const userName = document.getElementById('userName').value.trim();
        const userEmail = document.getElementById('userEmail').value.trim();
        const userPhone = document.getElementById('userPhone').value.trim();
        const trainerId = document.getElementById('trainerSelect').value;
        const months = parseInt(document.getElementById('monthsSelect').value);
        const paymentMethod = document.getElementById('paymentMethod').value;
        
        if (!userName) {
            Swal.fire('تنبيه', 'الرجاء إدخال الاسم الكامل', 'warning');
            return;
        }
        if (userName.length < 5) {
            Swal.fire('تنبيه', 'الاسم يجب أن يكون 5 أحرف على الأقل', 'warning');
            return;
        }
        if (!userEmail) {
            Swal.fire('تنبيه', 'الرجاء إدخال البريد الإلكتروني', 'warning');
            return;
        }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(userEmail)) {
            Swal.fire('تنبيه', 'البريد الإلكتروني غير صالح', 'warning');
            return;
        }
        if (!userPhone) {
            Swal.fire('تنبيه', 'الرجاء إدخال رقم الهاتف', 'warning');
            return;
        }
        const phoneRegex = /^01[0-9]{9}$/;
        if (!phoneRegex.test(userPhone)) {
            Swal.fire('تنبيه', 'رقم الهاتف غير صالح (مثال: 01012345678)', 'warning');
            return;
        }
        if (!trainerId) {
            Swal.fire('تنبيه', 'الرجاء اختيار المدرب', 'warning');
            return;
        }
        
        const trainer = trainersList.find(t => t.firebaseId == trainerId);
        if (!trainer) return;
        
        const totalPrice = calculatePrice(trainer.pricePerMonth, months);
        
        const subscriptionData = {
            userName, userEmail, userPhone,
            trainerId: trainer.firebaseId, trainerName: trainer.name,
            months, totalPrice, paymentMethod,
            createdAt: new Date().toISOString(),
            status: 'pending'
        };
        
        const btn = document.getElementById('subscribeBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري إرسال الطلب...';
        btn.disabled = true;
        
        try {
            await database.ref('subscriptions').push(subscriptionData);
            
            const resultDiv = document.getElementById('subscriptionResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h3 style="color: #f59e0b;"><i class="fas fa-clock"></i> ⏳ تم إرسال طلبك بنجاح!</h3>
                <p><strong>👤 المستخدم:</strong> ${userName}</p>
                <p><strong>📧 البريد:</strong> ${userEmail}</p>
                <p><strong>📱 الهاتف:</strong> ${userPhone}</p>
                <p><strong>🏋️ المدرب:</strong> ${trainer.name}</p>
                <p><strong>📅 المدة:</strong> ${months} شهر</p>
                <p><strong>💰 المبلغ:</strong> ${totalPrice.toLocaleString()} ج.م</p>
                <hr style="margin: 10px 0; border-color: #333;">
                <p style="color: #f59e0b; text-align: center;">
                    <i class="fas fa-hourglass-half"></i> جاري الانتظار... سيتم مراجعة طلبك من قبل المدرب ${trainer.name}
                </p>
            `;
            
            document.getElementById('userName').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('trainerSelect').value = '';
            updatePricePreview();
            
            Swal.fire({
                title: 'تم إرسال الطلب!',
                text: `طلب الاشتراك قيد المراجعة من قبل المدرب ${trainer.name}`,
                icon: 'info',
                confirmButtonColor: '#f59e0b',
                timer: 3000
            });
            
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 8000);
            
        } catch (error) {
            Swal.fire('خطأ', 'حدث خطأ في حفظ البيانات: ' + error.message, 'error');
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // Load Trainer Requests (الطلبات الخاصة بالمدرب فقط)
    function loadTrainerRequests() {
        const container = document.getElementById('trainerRequestsList');
        if (!currentTrainerId) return;
        
        database.ref('subscriptions').orderByChild('status').equalTo('pending').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const allRequests = Object.entries(data).map(([id, req]) => ({ ...req, id }));
                // فلترة الطلبات الخاصة بهذا المدرب فقط
                const myRequests = allRequests.filter(req => req.trainerId === currentTrainerId);
                
                if (myRequests.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">🎉 لا توجد طلبات معلقة لك</p>';
                } else {
                    container.innerHTML = myRequests.map(req => `
                        <div class="request-item">
                            <p><strong>👤 ${escapeHtml(req.userName)}</strong></p>
                            <p>📧 ${escapeHtml(req.userEmail)}</p>
                            <p>📱 ${escapeHtml(req.userPhone)}</p>
                            <p>💰 ${req.totalPrice} ج.م</p>
                            <p>📅 ${req.months} شهر</p>
                            <p>💳 ${req.paymentMethod === 'cash' ? 'كاش' : req.paymentMethod === 'card' ? 'بطاقة' : 'تحويل بنكي'}</p>
                            <div class="request-actions">
                                <button class="approve-btn" onclick="approveRequest('${req.id}', ${req.months}, ${req.totalPrice}, '${escapeHtml(req.userName)}')">✅ قبول</button>
                                <button class="reject-btn" onclick="rejectRequest('${req.id}', '${escapeHtml(req.userName)}')">❌ رفض</button>
                            </div>
                        </div>
                    `).join('');
                }
            } else {
                container.innerHTML = '<p style="text-align:center;">🎉 لا توجد طلبات معلقة لك</p>';
            }
        });
    }

    window.approveRequest = function(requestId, months, totalPrice, userName) {
        Swal.fire({
            title: 'تأكيد القبول',
            text: `هل أنت متأكد من قبول طلب ${userName}؟`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#10b981',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'نعم، اقبل',
            cancelButtonText: 'إلغاء'
        }).then((result) => {
            if (result.isConfirmed) {
                const endDate = calculateEndDate(new Date().toISOString(), months);
                database.ref(`subscriptions/${requestId}`).update({
                    status: 'approved',
                    approvedAt: new Date().toISOString(),
                    approvedBy: currentTrainerName,
                    endDate: endDate
                }).then(() => {
                    Swal.fire({
                        title: 'تم القبول!',
                        text: `تم قبول طلب ${userName} بنجاح`,
                        icon: 'success',
                        confirmButtonColor: '#10b981'
                    });
                    loadTrainerRequests();
                    loadSubscriptions();
                });
            }
        });
    };

    window.rejectRequest = function(requestId, userName) {
        Swal.fire({
            title: 'تأكيد الرفض',
            text: `هل أنت متأكد من رفض طلب ${userName}؟`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'نعم، ارفض',
            cancelButtonText: 'إلغاء'
        }).then((result) => {
            if (result.isConfirmed) {
                database.ref(`subscriptions/${requestId}`).update({
                    status: 'rejected',
                    rejectedAt: new Date().toISOString(),
                    rejectedBy: currentTrainerName
                }).then(() => {
                    Swal.fire({
                        title: 'تم الرفض!',
                        text: `تم رفض طلب ${userName}`,
                        icon: 'error',
                        confirmButtonColor: '#ef4444'
                    });
                    loadTrainerRequests();
                    loadSubscriptions();
                });
            }
        });
    };

    function escapeHtml(text) {
        if (!text) return 'غير محدد';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
        loadTrainers();
        loadSubscriptions();
        
        document.getElementById('subscribeBtn')?.addEventListener('click', handleSubscription);
        document.getElementById('monthsSelect')?.addEventListener('change', updatePricePreview);
        document.getElementById('trainerSelect')?.addEventListener('change', updatePricePreview);
        
        // Trainer Panel
        document.getElementById('trainerPanelBtn')?.addEventListener('click', () => {
            document.getElementById('trainerSelectModal').classList.add('active');
        });
        
        document.getElementById('confirmTrainerBtn')?.addEventListener('click', () => {
            const selectedTrainerId = document.getElementById('trainerSelectLogin').value;
            if (!selectedTrainerId) {
                Swal.fire('تنبيه', 'الرجاء اختيار اسمك من القائمة', 'warning');
                return;
            }
            const trainer = trainersList.find(t => t.firebaseId == selectedTrainerId);
            if (trainer) {
                currentTrainerId = trainer.firebaseId;
                currentTrainerName = trainer.name;
                document.getElementById('trainerNameTitle').innerHTML = `<i class="fas fa-chalkboard-user"></i> لوحة تحكم المدرب ${trainer.name}`;
                document.getElementById('trainerSelectModal').classList.remove('active');
                document.getElementById('trainerModal').classList.add('active');
                loadTrainerRequests();
            }
        });
        
        document.getElementById('closeSelectModal')?.addEventListener('click', () => {
            document.getElementById('trainerSelectModal').classList.remove('active');
        });
        
        document.getElementById('closeTrainerModal')?.addEventListener('click', () => {
            document.getElementById('trainerModal').classList.remove('active');
            currentTrainerId = null;
            currentTrainerName = null;
        });
    });
</script>
