<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iron Fitness | نظام الاشتراكات</title>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ff3b3b, #ff9f4a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            font-size: 36px;
        }
        
        .subscriptions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .subscription-card {
            background: rgba(17, 24, 39, 0.95);
            border-radius: 16px;
            padding: 20px;
            border-right: 3px solid #ff3b3b;
            transition: transform 0.3s;
        }
        
        .subscription-card:hover {
            transform: translateY(-5px);
        }
        
        .subscription-card h3 {
            color: #ff3b3b;
            margin-bottom: 10px;
        }
        
        .subscription-card p {
            margin: 8px 0;
            color: #9ca3af;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .badge-cash { background: #10b981; color: white; }
        .badge-card { background: #f59e0b; color: white; }
        .badge-bank { background: #3b82f6; color: white; }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #ff3b3b;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #6b7280;
        }
        
        .empty-state i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1f2937;
            border-top-color: #ff3b3b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #333;
            color: #6b7280;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border-right: 3px solid #ef4444;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-dumbbell"></i> IRON FITNESS | نظام الاشتراكات</h1>
    
    <div id="subscriptionsList" class="subscriptions-grid">
        <div class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل الاشتراكات...</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 IRON FITNESS GYM | نظام متكامل مع Firebase Realtime Database</p>
</footer>

<script>
    // ✅ Firebase Config - تم تصحيحه بمفاتيح حقيقية
    const firebaseConfig = {
        apiKey: "AIzaSyC_V-GXnzvoabdOdPppDYp4WCRjsDgzgkI",
        authDomain: "platform-46177.firebaseapp.com",
        databaseURL: "https://platform-46177-default-rtdb.firebaseio.com",
        projectId: "platform-46177",
        storageBucket: "platform-46177.firebasestorage.app",
        messagingSenderId: "933736879105",
        appId: "1:933736879105:web:13fa2d985214be44881c00"
    };

    // ✅ تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ✅ متغير لتخزين البيانات
    let allSubscriptions = [];

    // ✅ دالة تحميل وعرض الاشتراكات
    function loadSubscriptions() {
        const container = document.getElementById('subscriptionsList');
        
        // ✅ الاستماع للتغييرات في قاعدة البيانات
        database.ref('subscriptions').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data && Object.keys(data).length > 0) {
                // ✅ تحويل البيانات إلى مصفوفة
                allSubscriptions = Object.entries(data).map(([id, sub]) => ({ 
                    ...sub, 
                    id,
                    createdAt: sub.createdAt || new Date().toISOString()
                }));
                
                // ✅ ترتيب من الأحدث للأقدم
                const sorted = [...allSubscriptions].reverse();
                
                // ✅ عرض البيانات
                renderSubscriptions(sorted);
            } else {
                // ✅ عرض رسالة في حالة عدم وجود بيانات
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>📭 لا توجد اشتراكات حتى الآن</p>
                        <small>قم بتسجيل أول اشتراك في النظام</small>
                    </div>
                `;
            }
        }, (error) => {
            // ✅ معالجة الأخطاء
            console.error("خطأ في تحميل البيانات:", error);
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>❌ خطأ في تحميل البيانات</p>
                    <small>${error.message}</small>
                </div>
            `;
        });
    }

    // ✅ دالة عرض الاشتراكات في الصفحة
    function renderSubscriptions(subscriptions) {
        const container = document.getElementById('subscriptionsList');
        
        if (!subscriptions || subscriptions.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>📭 لا توجد اشتراكات</p>
                </div>
            `;
            return;
        }
        
        // ✅ عرض الاشتراكات
        container.innerHTML = subscriptions.map(sub => {
            // ✅ تحديد لون الشارة حسب طريقة الدفع
            let paymentBadge = '';
            if (sub.paymentMethod === 'cash') {
                paymentBadge = '<span class="badge badge-cash"><i class="fas fa-money-bill"></i> كاش</span>';
            } else if (sub.paymentMethod === 'card') {
                paymentBadge = '<span class="badge badge-card"><i class="fas fa-credit-card"></i> بطاقة ائتمان</span>';
            } else if (sub.paymentMethod === 'bank') {
                paymentBadge = '<span class="badge badge-bank"><i class="fas fa-university"></i> تحويل بنكي</span>';
            } else {
                paymentBadge = '<span class="badge badge-cash"><i class="fas fa-money-bill"></i> ' + (sub.paymentMethod || "كاش") + '</span>';
            }
            
            // ✅ تنسيق التاريخ
            let dateStr = 'تاريخ غير محدد';
            if (sub.createdAt) {
                try {
                    dateStr = new Date(sub.createdAt).toLocaleDateString('ar-EG');
                } catch(e) {
                    dateStr = 'تاريخ غير صالح';
                }
            }
            
            // ✅ منع الـ XSS
            const userName = (sub.userName || 'غير محدد').replace(/[<>]/g, '');
            const userEmail = (sub.userEmail || 'غير محدد').replace(/[<>]/g, '');
            const userPhone = (sub.userPhone || 'غير محدد').replace(/[<>]/g, '');
            const trainerName = (sub.trainerName || 'غير محدد').replace(/[<>]/g, '');
            
            return `
                <div class="subscription-card">
                    <h3><i class="fas fa-user"></i> ${userName}</h3>
                    <p><strong><i class="fas fa-envelope"></i> البريد:</strong> ${userEmail}</p>
                    <p><strong><i class="fas fa-phone"></i> الهاتف:</strong> ${userPhone}</p>
                    <p><strong><i class="fas fa-dumbbell"></i> المدرب:</strong> ${trainerName}</p>
                    <p><strong><i class="fas fa-calendar"></i> المدة:</strong> ${sub.months || '?'} شهر</p>
                    <p><strong><i class="fas fa-money-bill-wave"></i> السعر:</strong> ${(sub.totalPrice || 0).toLocaleString()} ج.م</p>
                    <p><strong><i class="fas fa-calendar-check"></i> تاريخ الاشتراك:</strong> ${dateStr}</p>
                    ${paymentBadge}
                </div>
            `;
        }).join('');
    }
    
    // ✅ عند تحميل الصفحة
    document.addEventListener('DOMContentLoaded', () => {
        loadSubscriptions();
    });
</script>

</body>
    </html>
