<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز امتحانات الثالثة ثانوي - نظام متكامل</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e8edf5 0%, #b0c4db 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .main-container {
      max-width: 1100px;
      width: 100%;
      min-height: 85vh;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 60px;
      padding: 2.5rem 3rem;
      box-shadow: 0 50px 100px -30px rgba(8, 20, 50, 0.4),
                  inset 0 1px 3px rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.4);
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .main-container::before {
      content: '✦';
      position: absolute;
      top: 30px;
      right: 50px;
      font-size: 8rem;
      color: rgba(26, 75, 116, 0.03);
      pointer-events: none;
      transform: rotate(15deg);
    }

    .main-container::after {
      content: '★';
      position: absolute;
      bottom: 30px;
      left: 50px;
      font-size: 10rem;
      color: rgba(247, 201, 72, 0.04);
      pointer-events: none;
      transform: rotate(-10deg);
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.04;
    }

    .bg-circle.c1 {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
      background: #1a4b74;
    }

    .bg-circle.c2 {
      width: 400px;
      height: 400px;
      bottom: -150px;
      right: -150px;
      background: #f7c948;
    }

    /* ========== PAGES ========== */
    .page {
      display: none;
      animation: fadeSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      z-index: 1;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ============================================================ */
    /* ==================== LOGIN PAGE ============================= */
    /* ============================================================ */

    .login-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 65vh;
      text-align: center;
      padding: 1rem 0;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 3rem 2.5rem;
      max-width: 450px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.1);
    }

    .login-box .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 3rem;
      color: white;
      box-shadow: 0 12px 30px -8px rgba(26, 51, 75, 0.3);
    }

    .login-box h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #0a1a2e;
      margin-bottom: 0.5rem;
    }

    .login-box p {
      color: #4a6a8a;
      font-weight: 500;
      margin-bottom: 2rem;
    }

    .login-box .input-group {
      margin-bottom: 1.2rem;
      text-align: right;
    }

    .login-box .input-group label {
      display: block;
      font-weight: 600;
      color: #0a1a2e;
      margin-bottom: 6px;
      font-size: 0.9rem;
      text-align: right;
    }

    .login-box .input-group label i {
      margin-left: 10px;
      color: #2a5a7a;
    }

    .login-box .input-group input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #dce6f0;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.75);
      font-size: 0.95rem;
      transition: all 0.25s ease;
      outline: none;
      font-weight: 500;
      color: #0a1a2e;
      text-align: right;
    }

    .login-box .input-group input:focus {
      border-color: #1a4b74;
      box-shadow: 0 0 0 6px rgba(26, 75, 116, 0.08);
      background: white;
    }

    .login-box .input-group input::placeholder {
      color: #8aa5c0;
      font-weight: 400;
    }

    .btn-login {
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      border: none;
      color: white;
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      box-shadow: 0 12px 28px -12px rgba(26, 51, 75, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px -14px #0a1a2e;
      background: linear-gradient(135deg, #0f2338, #1a3b5a);
    }

    .btn-login:active {
      transform: scale(0.97);
    }

    .login-error {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
      font-weight: 600;
    }

    .login-error.show {
      display: block;
    }

    /* ============================================================ */
    /* ==================== DASHBOARD PAGE ========================= */
    /* ============================================================ */

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .dashboard-header h1 {
      font-weight: 800;
      font-size: 1.7rem;
      color: #0a1a2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dashboard-header h1 i {
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      color: white;
      padding: 12px 16px;
      border-radius: 50px;
      font-size: 1.2rem;
      box-shadow: 0 8px 18px -8px rgba(0, 20, 50, 0.3);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255, 255, 255, 0.4);
      padding: 8px 20px 8px 12px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .user-profile .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
    }

    .user-profile .user-name {
      font-weight: 700;
      color: #0a1a2e;
    }

    .btn-logout {
      background: rgba(231, 76, 60, 0.1);
      border: 2px solid rgba(231, 76, 60, 0.2);
      color: #e74c3c;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-logout:hover {
      background: rgba(231, 76, 60, 0.15);
      transform: scale(1.02);
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .stat-card .number {
      font-size: 2rem;
      font-weight: 900;
      color: #1a334b;
    }

    .stat-card .label {
      font-size: 0.85rem;
      color: #4a6a8a;
      font-weight: 500;
    }

    /* Subjects Grid */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 1.5rem 0;
    }

    .subject-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 1.8rem;
      border: 2px solid rgba(255, 255, 255, 0.4);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .subject-card:hover {
      transform: translateY(-5px);
      border-color: #1a4b74;
      box-shadow: 0 16px 32px -12px rgba(26, 75, 116, 0.15);
      background: rgba(255, 255, 255, 0.7);
    }

    .subject-card .subject-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    .subject-card .subject-name {
      font-size: 1.3rem;
      font-weight: 800;
      color: #0a1a2e;
      margin-bottom: 0.3rem;
    }

    .subject-card .subject-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a334b;
      margin: 0.5rem 0;
    }

    .subject-card .subject-price small {
      font-size: 0.8rem;
      font-weight: 500;
      color: #4a6a8a;
    }

    .subject-card .subject-desc {
      color: #4a6a8a;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .subject-card .btn-subscribe-subject {
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      border: none;
      color: white;
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .subject-card .btn-subscribe-subject:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -10px rgba(26, 51, 75, 0.4);
      background: linear-gradient(135deg, #0f2338, #1a3b5a);
    }

    .subject-card .btn-subscribe-subject:active {
      transform: scale(0.96);
    }

    .subject-card .btn-subscribe-subject.booked {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      cursor: default;
    }

    .subject-card .btn-subscribe-subject.booked:hover {
      transform: none;
      box-shadow: none;
    }

    .subject-card .booked-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    /* ============================================================ */
    /* ==================== PAYMENT PAGE =========================== */
    /* ============================================================ */

    .payment-content {
      max-width: 550px;
      margin: 0 auto;
      padding: 1rem 0;
    }

    .payment-box {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.08);
    }

    .payment-box .payment-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0a1a2e;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .payment-box .payment-sub {
      text-align: center;
      color: #4a6a8a;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .payment-box .payment-sub .highlight {
      color: #1a4b74;
      font-weight: 700;
    }

    .payment-box .input-group {
      margin-bottom: 1.2rem;
    }

    .payment-box .input-group label {
      display: block;
      font-weight: 600;
      color: #0a1a2e;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .payment-box .input-group label i {
      margin-left: 10px;
      color: #2a5a7a;
    }

    .payment-box .input-group input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #dce6f0;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.75);
      font-size: 0.95rem;
      transition: all 0.25s ease;
      outline: none;
      font-weight: 500;
      color: #0a1a2e;
    }

    .payment-box .input-group input:focus {
      border-color: #1a4b74;
      box-shadow: 0 0 0 6px rgba(26, 75, 116, 0.08);
      background: white;
    }

    .payment-box .input-group input::placeholder {
      color: #8aa5c0;
      font-weight: 400;
    }

    .payment-summary {
      background: rgba(26, 75, 116, 0.05);
      border-radius: 20px;
      padding: 1rem 1.5rem;
      margin: 1.2rem 0;
      border-right: 4px solid #1a4b74;
    }

    .payment-summary .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-weight: 500;
      color: #0a1a2e;
    }

    .payment-summary .summary-row.total {
      border-top: 2px solid rgba(26, 75, 116, 0.1);
      margin-top: 8px;
      padding-top: 10px;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .btn-payment {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      border: none;
      color: white;
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      box-shadow: 0 12px 28px -12px rgba(39, 174, 96, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-payment:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px -14px #27ae60;
      background: linear-gradient(135deg, #1e8449, #27ae60);
    }

    .btn-payment:active {
      transform: scale(0.97);
    }

    .btn-payment.cancel {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      box-shadow: 0 12px 28px -12px rgba(231, 76, 60, 0.4);
    }

    .btn-payment.cancel:hover {
      background: linear-gradient(135deg, #c0392b, #a93226);
      box-shadow: 0 18px 36px -14px #e74c3c;
    }

    /* ============================================================ */
    /* ==================== BOOKINGS PAGE ========================== */
    /* ============================================================ */

    .bookings-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .booking-item-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 25px;
      padding: 1.2rem 1.8rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      transition: all 0.3s ease;
    }

    .booking-item-card:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #b0c8dd;
    }

    .booking-item-card .booking-info {
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .booking-item-card .booking-info .subject-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: #0a1a2e;
    }

    .booking-item-card .booking-info .subject-price {
      font-weight: 600;
      color: #1a334b;
    }

    .booking-item-card .booking-status {
      padding: 4px 16px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .booking-item-card .booking-status.confirmed {
      background: #d4edda;
      color: #155724;
      border: 1px solid #8fcaa6;
    }

    .booking-item-card .booking-status.pending {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffd970;
    }

    .booking-item-card .booking-actions {
      display: flex;
      gap: 8px;
    }

    .booking-item-card .booking-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s ease;
      border: 2px solid #dce6f0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .booking-item-card .booking-actions .cancel-btn {
      color: #e74c3c;
      border-color: #f0cfd2;
      background: rgba(231, 76, 60, 0.04);
    }

    .booking-item-card .booking-actions .cancel-btn:hover {
      background: #fde7ea;
      border-color: #d48a92;
    }

    .empty-bookings {
      text-align: center;
      padding: 3rem 0.5rem;
      color: #4a6a8a;
    }

    .empty-bookings i {
      font-size: 4rem;
      opacity: 0.2;
      display: block;
      margin-bottom: 1rem;
      color: #1a334b;
    }

    .empty-bookings p {
      font-weight: 500;
      font-size: 1.1rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1.8rem;
      flex-wrap: wrap;
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 10px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tab {
      padding: 8px 24px;
      border-radius: 50px;
      font-weight: 600;
      color: #4a6a8a;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      background: transparent;
      font-size: 0.9rem;
    }

    .tab.active {
      background: linear-gradient(135deg, #1a334b, #2a4a6a);
      color: white;
      box-shadow: 0 4px 12px -4px rgba(26, 51, 75, 0.3);
    }

    .tab:hover:not(.active) {
      background: rgba(255, 255, 255, 0.3);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 750px) {
      .main-container {
        padding: 1.8rem 1.5rem;
        border-radius: 40px;
      }

      .login-box {
        padding: 2rem 1.5rem;
      }

      .subjects-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .dashboard-header h1 {
        font-size: 1.3rem;
      }

      .payment-box {
        padding: 1.8rem;
      }

      .booking-item-card {
        flex-direction: column;
        align-items: stretch;
      }

      .booking-item-card .booking-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 480px) {
      .main-container {
        padding: 1rem 0.8rem;
        border-radius: 30px;
      }

      .login-box .avatar {
        width: 70px;
        height: 70px;
        font-size: 2rem;
      }

      .login-box h2 {
        font-size: 1.3rem;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .tabs {
        padding: 4px 8px;
      }

      .tab {
        padding: 6px 14px;
        font-size: 0.75rem;
      }

      .user-profile .user-name {
        font-size: 0.8rem;
      }

      .btn-logout {
        padding: 6px 12px;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>

    <!-- ==================== PAGE 1: LOGIN ==================== -->
    <div class="page active" id="loginPage">
      <div class="login-content">
        <div class="login-box">
          <div class="avatar">
            <i class="fas fa-user-graduate"></i>
          </div>
          <h2>تسجيل الدخول</h2>
          <p>سجل دخولك لحجز امتحانات الثالثة ثانوي</p>
          <form id="loginForm">
            <div class="input-group">
              <label for="loginName"><i class="fas fa-user"></i> اسم المستخدم</label>
              <input type="text" id="loginName" placeholder="أدخل اسم المستخدم" required>
            </div>
            <div class="input-group">
              <label for="loginPassword"><i class="fas fa-lock"></i> كلمة المرور</label>
              <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
            </div>
            <div class="login-error" id="loginError">
              <i class="fas fa-exclamation-circle"></i> اسم المستخدم أو كلمة المرور غير صحيحة
            </div>
            <button type="submit" class="btn-login">
              <i class="fas fa-sign-in-alt"></i> دخول
            </button>
          </form>
          <p style="margin-top:1.2rem; font-size:0.85rem; color:#4a6a8a;">
            <i class="fas fa-info-circle"></i> تجريبي: admin / admin123
          </p>
        </div>
      </div>
    </div>

    <!-- ==================== PAGE 2: DASHBOARD ==================== -->
    <div class="page" id="dashboardPage">
      <!-- Header -->
      <div class="dashboard-header">
        <h1><i class="fas fa-user-graduate"></i> لوحة التحكم</h1>
        <div class="user-profile">
          <div class="user-avatar"><i class="fas fa-user"></i></div>
          <span class="user-name" id="displayUserName">أحمد</span>
          <button class="btn-logout" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> خروج
          </button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="number" id="totalBooked">0</div>
          <div class="label"><i class="fas fa-book"></i> المواد المحجوزة</div>
        </div>
        <div class="stat-card">
          <div class="number" id="totalPrice">0</div>
          <div class="label"><i class="fas fa-coins"></i> إجمالي المدفوع</div>
        </div>
        <div class="stat-card">
          <div class="number" id="pendingCount">0</div>
          <div class="label"><i class="fas fa-clock"></i> قيد المراجعة</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="subjects"><i class="fas fa-th-list"></i> المواد</button>
        <button class="tab" data-tab="bookings"><i class="fas fa-clipboard-list"></i> حجوزاتي</button>
      </div>

      <!-- Tab Content: Subjects -->
      <div id="tabSubjects" class="tab-content">
        <div class="subjects-grid" id="subjectsContainer">
          <!-- سيتم ملؤها بواسطة JS -->
        </div>
      </div>

      <!-- Tab Content: Bookings -->
      <div id="tabBookings" class="tab-content" style="display:none;">
        <div id="bookingsContainer">
          <!-- سيتم ملؤها بواسطة JS -->
        </div>
      </div>
    </div>

    <!-- ==================== PAGE 3: PAYMENT ==================== -->
    <div class="page" id="paymentPage">
      <div class="payment-content">
        <div class="payment-box">
          <div class="payment-title">
            <i class="fas fa-credit-card"></i> إتمام الدفع
          </div>
          <div class="payment-sub">
            حجز مادة <span class="highlight" id="paymentSubjectName">الرياضيات</span>
          </div>

          <form id="paymentForm">
            <div class="input-group">
              <label for="paymentName"><i class="fas fa-user"></i> الاسم الكامل</label>
              <input type="text" id="paymentName" placeholder="أدخل اسمك الكامل" required>
            </div>
            <div class="input-group">
              <label for="paymentPhone"><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
              <input type="tel" id="paymentPhone" placeholder="05xxxxxxxx" required>
            </div>

            <div class="payment-summary">
              <div class="summary-row">
                <span>المادة:</span>
                <span id="summarySubject">الرياضيات</span>
              </div>
              <div class="summary-row">
                <span>السعر:</span>
                <span id="summaryPrice">50 ر.س</span>
              </div>
              <div class="summary-row total">
                <span>الإجمالي:</span>
                <span id="summaryTotal">50 ر.س</span>
              </div>
            </div>

            <button type="submit" class="btn-payment">
              <i class="fas fa-check-circle"></i> تأكيد الحجز
            </button>
            <button type="button" class="btn-payment cancel" id="cancelPaymentBtn" style="margin-top:0.8rem;">
              <i class="fas fa-times"></i> إلغاء
            </button>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script>
    (function() {
      "use strict";

      // ===== DATA =====
      const subjectsData = [
        { id: 1, name: 'الرياضيات', icon: '📐', price: 50, desc: 'امتحان الرياضيات - المستوى المتقدم' },
        { id: 2, name: 'الفيزياء', icon: '⚛️', price: 50, desc: 'امتحان الفيزياء - الميكانيكا والكهرباء' },
        { id: 3, name: 'الكيمياء', icon: '🧪', price: 45, desc: 'امتحان الكيمياء - العضوية والغير عضوية' },
        { id: 4, name: 'الأحياء', icon: '🧬', price: 45, desc: 'امتحان الأحياء - الخلية والوراثة' },
        { id: 5, name: 'اللغة العربية', icon: '📖', price: 40, desc: 'امتحان اللغة العربية - النحو والأدب' },
        { id: 6, name: 'اللغة الإنجليزية', icon: '🇬🇧', price: 40, desc: 'امتحان اللغة الإنجليزية - القواعد والمفردات' },
        { id: 7, name: 'التاريخ', icon: '🏛️', price: 35, desc: 'امتحان التاريخ - العصور الإسلامية' },
        { id: 8, name: 'الجغرافيا', icon: '🌍', price: 35, desc: 'امتحان الجغرافيا - الخرائط والمناخ' },
        { id: 9, name: 'الإحصاء', icon: '📊', price: 35, desc: 'امتحان الإحصاء - الاحتمالات والإحصاء' },
        { id: 10, name: 'الفرنسية', icon: '🇫🇷', price: 35, desc: 'امتحان اللغة الفرنسية - القواعد والمحادثة' }
      ];

      // ===== STATE =====
      let currentUser = null;
      let bookings = [];
      let selectedSubject = null;

      // ===== DOM REFS =====
      const loginPage = document.getElementById('loginPage');
      const dashboardPage = document.getElementById('dashboardPage');
      const paymentPage = document.getElementById('paymentPage');

      const loginForm = document.getElementById('loginForm');
      const loginName = document.getElementById('loginName');
      const loginPassword = document.getElementById('loginPassword');
      const loginError = document.getElementById('loginError');
      const displayUserName = document.getElementById('displayUserName');
      const logoutBtn = document.getElementById('logoutBtn');

      const subjectsContainer = document.getElementById('subjectsContainer');
      const bookingsContainer = document.getElementById('bookingsContainer');
      const totalBooked = document.getElementById('totalBooked');
      const totalPrice = document.getElementById('totalPrice');
      const pendingCount = document.getElementById('pendingCount');

      const paymentSubjectName = document.getElementById('paymentSubjectName');
      const summarySubject = document.getElementById('summarySubject');
      const summaryPrice = document.getElementById('summaryPrice');
      const summaryTotal = document.getElementById('summaryTotal');
      const paymentForm = document.getElementById('paymentForm');
      const paymentName = document.getElementById('paymentName');
      const paymentPhone = document.getElementById('paymentPhone');
      const cancelPaymentBtn = document.getElementById('cancelPaymentBtn');

      const tabs = document.querySelectorAll('.tab');
      const tabSubjects = document.getElementById('tabSubjects');
      const tabBookings = document.getElementById('tabBookings');

      // ===== LOGIN =====
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = loginName.value.trim();
        const password = loginPassword.value.trim();

        if (name === 'admin' && password === 'admin123') {
          currentUser = { name: 'أحمد محمد' };
          loginError.classList.remove('show');
          showPage('dashboardPage');
          displayUserName.textContent = currentUser.name;
          renderAll();
        } else {
          loginError.classList.add('show');
        }
      });

      // ===== LOGOUT =====
      logoutBtn.addEventListener('click', function() {
        if (confirm('هل أنت متأكد من الخروج؟')) {
          currentUser = null;
          bookings = [];
          showPage('loginPage');
          loginName.value = '';
          loginPassword.value = '';
          loginError.classList.remove('show');
        }
      });

      // ===== PAGE NAVIGATION =====
      function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // ===== TABS =====
      tabs.forEach(tab => {
        tab.addEventListener('click', function() {
          tabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');

          const target = this.dataset.tab;
          if (target === 'subjects') {
            tabSubjects.style.display = 'block';
            tabBookings.style.display = 'none';
          } else {
            tabSubjects.style.display = 'none';
            tabBookings.style.display = 'block';
            renderBookings();
          }
        });
      });

      // ===== RENDER SUBJECTS =====
      function renderSubjects() {
        subjectsContainer.innerHTML = '';
        subjectsData.forEach(sub => {
          const isBooked = bookings.some(b => b.subjectId === sub.id && b.status !== 'cancelled');
          const card = document.createElement('div');
          card.className = 'subject-card';
          card.innerHTML = `
            <div class="subject-icon">${sub.icon}</div>
            <div class="subject-name">${sub.name}</div>
            <div class="subject-price">${sub.price} <small>ر.س</small></div>
            <div class="subject-desc">${sub.desc}</div>
            ${isBooked ? '<div class="booked-badge"><i class="fas fa-check"></i> محجوز</div>' : ''}
            <button class="btn-subscribe-subject ${isBooked ? 'booked' : ''}" 
                    data-id="${sub.id}"
                    ${isBooked ? 'disabled' : ''}>
              <i class="fas ${isBooked ? 'fa-check-circle' : 'fa-shopping-cart'}"></i>
              ${isBooked ? 'تم الحجز' : 'تسجيل اشتراك'}
            </button>
          `;
          subjectsContainer.appendChild(card);

          const btn = card.querySelector('.btn-subscribe-subject');
          if (!btn.disabled) {
            btn.addEventListener('click', function() {
              const id = parseInt(this.dataset.id);
              const subject = subjectsData.find(s => s.id === id);
              if (subject) {
                selectedSubject = subject;
                openPayment(subject);
              }
            });
          }
        });
      }

      // ===== OPEN PAYMENT =====
      function openPayment(subject) {
        paymentSubjectName.textContent = subject.name;
        summarySubject.textContent = subject.name;
        summaryPrice.textContent = subject.price + ' ر.س';
        summaryTotal.textContent = subject.price + ' ر.س';
        paymentName.value = currentUser ? currentUser.name : '';
        paymentPhone.value = '';
        showPage('paymentPage');
      }

      // ===== PAYMENT =====
      paymentForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const name = paymentName.value.trim();
        const phone = paymentPhone.value.trim();

        if (!name || !phone) {
          alert('يرجى ملء جميع الحقول.');
          return;
        }

        if (phone.length < 10) {
          alert('يرجى إدخال رقم هاتف صحيح.');
          return;
        }

        // Check if already booked
        if (bookings.some(b => b.subjectId === selectedSubject.id && b.status !== 'cancelled')) {
          alert('هذه المادة محجوزة بالفعل!');
          showPage('dashboardPage');
          return;
        }

        // Add booking
        bookings.push({
          id: Date.now(),
          subjectId: selectedSubject.id,
          subjectName: selectedSubject.name,
          subjectIcon: selectedSubject.icon,
          price: selectedSubject.price,
          studentName: name,
          studentPhone: phone,
          status: 'confirmed',
          date: new Date().toLocaleDateString('ar-EG')
        });

        alert(`✅ تم حجز مادة "${selectedSubject.name}" بنجاح!`);
        showPage('dashboardPage');
        renderAll();
      });

      // ===== CANCEL PAYMENT =====
      cancelPaymentBtn.addEventListener('click', function() {
        if (confirm('هل تريد إلغاء عملية الحجز؟')) {
          selectedSubject = null;
          showPage('dashboardPage');
        }
      });

      // ===== RENDER BOOKINGS =====
      function renderBookings() {
        const activeBookings = bookings.filter(b => b.status !== 'cancelled');
        bookingsContainer.innerHTML = '';

        if (activeBookings.length === 0) {
          bookingsContainer.innerHTML = `
            <div class="empty-bookings">
              <i class="fas fa-calendar-times"></i>
              <p>لا توجد حجوزات حتى الآن</p>
              <p style="font-size:0.9rem; font-weight:400; color:#4a6a8a;">قم بحجز المواد التي ترغب في أداء امتحانها</p>
            </div>
          `;
          return;
        }

        activeBookings.forEach(booking => {
          const item = document.createElement('div');
          item.className = 'booking-item-card';
          item.innerHTML = `
            <div class="booking-info">
              <span style="font-size:1.8rem;">${booking.subjectIcon}</span>
              <span class="subject-name">${booking.subjectName}</span>
              <span class="subject-price">${booking.price} ر.س</span>
              <span class="booking-status confirmed">
                <i class="fas fa-check-circle"></i> مؤكد
              </span>
              <span style="font-size:0.8rem; color:#4a6a8a;">
                <i class="fas fa-calendar-alt"></i> ${booking.date}
              </span>
            </div>
            <div class="booking-actions">
              <button class="cancel-btn" data-id="${booking.id}">
                <i class="fas fa-times"></i> إلغاء
              </button>
            </div>
          `;
          bookingsContainer.appendChild(item);

          const cancelBtn = item.querySelector('.cancel-btn');
          cancelBtn.addEventListener('click', function() {
            const id = parseInt(this.dataset.id);
            if (confirm(`هل تريد إلغاء حجز هذه المادة؟`)) {
              const index = bookings.findIndex(b => b.id === id);
              if (index !== -1) {
                bookings[index].status = 'cancelled';
                renderAll();
                // Switch to subjects tab
                tabs.forEach(t => t.classList.remove('active'));
                document.querySelector('.tab[data-tab="subjects"]').classList.add('active');
                tabSubjects.style.display = 'block';
                tabBookings.style.display = 'none';
              }
            }
          });
        });
      }

      // ===== UPDATE STATS =====
      function updateStats() {
        const active = bookings.filter(b => b.status !== 'cancelled');
        totalBooked.textContent = active.length;
        const total = active.reduce((sum, b) => sum + b.price, 0);
        totalPrice.textContent = total + ' ر.س';
        pendingCount.textContent = '0'; // All are confirmed immediately
      }

      // ===== RENDER ALL =====
      function renderAll() {
        renderSubjects();
        renderBookings();
        updateStats();
      }

      // ===== INIT =====
      renderAll();

      // ===== KEYBOARD SHORTCUT: Enter on login =====
      loginPassword.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          loginForm.dispatchEvent(new Event('submit'));
        }
      });

      // ===== DEMO: Auto-login hint =====
      console.log('🔑 Demo: admin / admin123');

    })();
  </script>

</body>
  </html>
