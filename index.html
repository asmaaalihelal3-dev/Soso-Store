<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز امتحانات الثالثة ثانوي</title>
  <!-- Font Awesome 6 (professional icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #eef2f7 0%, #d6e0ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem;
    }

    /* main container – glassmorphism premium */
    .booking-wrapper {
      max-width: 1200px;
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 56px;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 30px 50px -20px rgba(8, 20, 40, 0.35),
                  inset 0 1px 2px rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s;
    }

    /* header */
    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      gap: 1rem;
    }

    .hero-header h1 {
      font-weight: 700;
      font-size: 2.2rem;
      color: #0b1f33;
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: -0.3px;
    }

    .hero-header h1 i {
      background: #1e3b5a;
      color: white;
      padding: 14px 16px;
      border-radius: 60px;
      font-size: 1.6rem;
      box-shadow: 0 10px 16px -8px rgba(0,20,40,0.25);
    }

    .badge-gold {
      background: #1f3349;
      color: #f5e7c8;
      padding: 10px 26px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 14px -6px rgba(0,0,0,0.12);
      border: 1px solid rgba(255,215,120,0.2);
    }

    .badge-gold i {
      color: #f7c948;
      font-size: 1.2rem;
    }

    /* grid */
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2.2rem;
      margin-top: 0.6rem;
    }

    @media (max-width: 820px) {
      .grid-2col {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
      .booking-wrapper {
        padding: 1.8rem 1.5rem;
      }
      .hero-header h1 {
        font-size: 1.8rem;
      }
    }

    /* cards */
    .card-panel {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 36px;
      padding: 1.8rem 2rem 2.2rem;
      box-shadow: 0 12px 28px -12px rgba(0, 20, 40, 0.12);
      border: 1px solid rgba(255,255,255,0.75);
    }

    .card-panel h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a2f44;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid rgba(200, 215, 232, 0.5);
      padding-bottom: 1rem;
      margin-bottom: 1.8rem;
    }

    .card-panel h2 i {
      color: #28547a;
    }

    /* form */
    .input-group {
      margin-bottom: 1.6rem;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      color: #1a334b;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .input-group label i {
      margin-left: 10px;
      color: #3b6b93;
      width: 22px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #cfddee;
      border-radius: 40px;
      background: white;
      font-size: 1rem;
      transition: 0.2s;
      outline: none;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #1a4b74;
      box-shadow: 0 0 0 4px rgba(26, 75, 116, 0.12);
    }

    .input-group select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%231a4b74" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: left 20px center;
      background-size: 18px;
      padding-left: 50px;
    }

    .btn-primary {
      background: #1a334b;
      border: none;
      color: white;
      width: 100%;
      padding: 16px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      box-shadow: 0 12px 18px -8px rgba(20, 40, 60, 0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary i {
      font-size: 1.2rem;
    }

    .btn-primary:hover {
      background: #0f2338;
      transform: scale(1.01);
      box-shadow: 0 18px 26px -10px #0a1d30;
    }

    .btn-primary:active {
      transform: scale(0.96);
    }

    /* booking list */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(200, 215, 232, 0.5);
      padding-bottom: 0.8rem;
      margin-bottom: 1.6rem;
    }

    .list-header h2 {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .count-badge {
      background: #1a334b;
      color: white;
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .booking-scroll {
      max-height: 380px;
      overflow-y: auto;
      padding-left: 4px;
    }

    .booking-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .booking-scroll::-webkit-scrollbar-track {
      background: #d3dfed;
      border-radius: 20px;
    }
    .booking-scroll::-webkit-scrollbar-thumb {
      background: #2a5a7e;
      border-radius: 20px;
    }

    .booking-item {
      background: white;
      padding: 16px 18px;
      border-radius: 28px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #e7eef8;
      transition: 0.15s;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
    }

    .booking-item:hover {
      border-color: #b6cde0;
      background: #fbfdff;
    }

    .booking-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .booking-title {
      font-weight: 600;
      color: #0b1f31;
      font-size: 1.05rem;
    }

    .booking-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: #3a5a77;
    }

    .booking-meta i {
      margin-left: 6px;
      color: #33638b;
      width: 18px;
    }

    .status-tag {
      background: #e4eefa;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #194263;
    }

    .booking-actions {
      display: flex;
      gap: 8px;
    }

    .booking-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      padding: 8px 10px;
      border-radius: 40px;
      transition: 0.1s;
      color: #3f6483;
    }

    .booking-actions .delete-btn {
      color: #b1424a;
    }

    .booking-actions .delete-btn:hover {
      background: #fde7ea;
      color: #9e2d38;
    }

    .booking-actions .edit-btn:hover {
      background: #e1edf7;
      color: #1d4d73;
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 0.5rem;
      color: #4e6f8c;
    }

    .empty-state i {
      font-size: 3.6rem;
      opacity: 0.3;
      margin-bottom: 14px;
      display: block;
    }

    .empty-state p {
      font-weight: 400;
    }

    /* small */
    @media (max-width: 460px) {
      .booking-item {
        flex-wrap: wrap;
        gap: 12px;
      }
      .booking-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="booking-wrapper">

  <!-- header -->
  <div class="hero-header">
    <h1><i class="fas fa-user-graduate"></i> حجز امتحانات الثالثة ثانوي</h1>
    <div class="badge-gold">
      <i class="fas fa-star"></i> العام الدراسي 2025-2026
    </div>
  </div>

  <!-- grid -->
  <div class="grid-2col">
    <!-- form card -->
    <div class="card-panel">
      <h2><i class="fas fa-calendar-plus"></i> حجز موعد امتحان</h2>
      <form id="bookingForm">
        <div class="input-group">
          <label for="studentName"><i class="fas fa-user"></i> اسم الطالب</label>
          <input type="text" id="studentName" placeholder="أدخل الاسم الثلاثي" required>
        </div>

        <div class="input-group">
          <label for="examSubject"><i class="fas fa-book"></i> المادة</label>
          <select id="examSubject" required>
            <option value="" disabled selected>-- اختر المادة --</option>
            <option value="اللغة العربية">اللغة العربية</option>
            <option value="اللغة الإنجليزية">اللغة الإنجليزية</option>
            <option value="الرياضيات">الرياضيات</option>
            <option value="الفيزياء">الفيزياء</option>
            <option value="الكيمياء">الكيمياء</option>
            <option value="الأحياء">الأحياء</option>
            <option value="التاريخ">التاريخ</option>
            <option value="الجغرافيا">الجغرافيا</option>
            <option value="الفلسفة">الفلسفة</option>
          </select>
        </div>

        <div class="input-group">
          <label for="examDate"><i class="fas fa-calendar-day"></i> تاريخ الامتحان</label>
          <input type="date" id="examDate" required>
        </div>

        <button type="submit" class="btn-primary">
          <i class="fas fa-check-circle"></i> حجز الامتحان
        </button>
      </form>
      <p style="margin-top: 18px; font-size: 0.8rem; color: #3f627f; text-align: center; opacity: 0.8;">
        <i class="fas fa-info-circle"></i> يمكنك حجز امتحانات متعددة بكل سهولة
      </p>
    </div>

    <!-- list card -->
    <div class="card-panel">
      <div class="list-header">
        <h2><i class="fas fa-clipboard-list"></i> الحجوزات المسجلة</h2>
        <span class="count-badge"><i class="fas fa-file-signature"></i> <span id="bookingCounter">0</span></span>
      </div>

      <div class="booking-scroll" id="bookingListContainer">
        <div class="empty-state" id="emptyState">
          <i class="fas fa-calendar-times"></i>
          <p>لا توجد حجوزات حتى الآن</p>
          <p style="font-size: 0.9rem;">قم بحجز امتحانك الأول</p>
        </div>
        <div id="bookingList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // مصفوفة الحجوزات
    let bookings = [];

    // DOM elements
    const bookingForm = document.getElementById('bookingForm');
    const studentNameInput = document.getElementById('studentName');
    const examSubjectSelect = document.getElementById('examSubject');
    const examDateInput = document.getElementById('examDate');
    const bookingListEl = document.getElementById('bookingList');
    const emptyState = document.getElementById('emptyState');
    const bookingCounter = document.getElementById('bookingCounter');

    // تعيين تاريخ اليوم كافتراضي
    (function setDefaultDate() {
      const today = new Date().toISOString().split('T')[0];
      examDateInput.value = today;
    })();

    // دالة عرض الحجوزات
    function renderBookings() {
      bookingListEl.innerHTML = '';

      if (bookings.length === 0) {
        emptyState.style.display = 'block';
        bookingCounter.textContent = '0';
        return;
      }

      emptyState.style.display = 'none';
      bookingCounter.textContent = bookings.length;

      // عرض الأحدث أولاً
      const sorted = [...bookings].reverse();

      sorted.forEach((booking, idx) => {
        // الفهرس الأصلي في المصفوفة
        const originalIndex = bookings.length - 1 - idx;

        const item = document.createElement('div');
        item.className = 'booking-item';

        // info
        const infoDiv = document.createElement('div');
        infoDiv.className = 'booking-info';

        const titleSpan = document.createElement('span');
        titleSpan.className = 'booking-title';
        titleSpan.textContent = booking.student;

        const metaDiv = document.createElement('div');
        metaDiv.className = 'booking-meta';
        metaDiv.innerHTML = `
          <span><i class="fas fa-book-open"></i> ${booking.subject}</span>
          <span><i class="fas fa-calendar-alt"></i> ${booking.date}</span>
          <span class="status-tag"><i class="far fa-hourglass"></i> مؤكد</span>
        `;

        infoDiv.appendChild(titleSpan);
        infoDiv.appendChild(metaDiv);

        // actions
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'booking-actions';

        // edit button
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerHTML = '<i class="fas fa-pen"></i>';
        editBtn.setAttribute('aria-label', 'تعديل الحجز');
        editBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          // ملء النموذج بالبيانات
          studentNameInput.value = booking.student;
          examSubjectSelect.value = booking.subject;
          examDateInput.value = booking.date;

          // حذف الحجز الحالي (لإعادة الحجز بعد التعديل)
          if (confirm(`تعديل حجز "${booking.student}"؟ سيتم حذف الحجز الحالي، ويمكنك إعادة الحجز بالبيانات الجديدة.`)) {
            bookings.splice(originalIndex, 1);
            renderBookings();
            studentNameInput.focus();
          }
        });

        // delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        deleteBtn.setAttribute('aria-label', 'إلغاء الحجز');
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm(`هل تريد إلغاء حجز "${booking.student}" لمادة ${booking.subject}؟`)) {
            bookings.splice(originalIndex, 1);
            renderBookings();
          }
        });

        actionsDiv.appendChild(editBtn);
        actionsDiv.appendChild(deleteBtn);

        item.appendChild(infoDiv);
        item.appendChild(actionsDiv);
        bookingListEl.appendChild(item);
      });
    }

    // إضافة حجز جديد
    function addBooking(event) {
      event.preventDefault();

      const student = studentNameInput.value.trim();
      const subject = examSubjectSelect.value;
      const date = examDateInput.value;

      if (!student || !subject || !date) {
        alert('يرجى ملء جميع الحقول: اسم الطالب، المادة، التاريخ.');
        return;
      }

      // منع التكرار (نفس الطالب + نفس المادة + نفس التاريخ)
      const duplicate = bookings.some(b => 
        b.student === student && b.subject === subject && b.date === date
      );
      if (duplicate) {
        alert('هذا الحجز موجود مسبقاً (نفس الطالب، المادة، والتاريخ).');
        return;
      }

      // إضافة الحجز
      bookings.push({
        student: student,
        subject: subject,
        date: date
      });

      renderBookings();

      // إعادة تعيين النموذج (مع الاحتفاظ بالتاريخ)
      bookingForm.reset();
      const today = new Date().toISOString().split('T')[0];
      examDateInput.value = today;
      studentNameInput.focus();

      // رسالة نجاح خفيفة (اختياري)
    }

    // ربط حدث النموذج
    bookingForm.addEventListener('submit', addBooking);

    // بيانات نموذجية احترافية
    (function loadSampleBookings() {
      if (bookings.length === 0) {
        bookings = [
          { student: 'أحمد محمد علي', subject: 'الرياضيات', date: '2026-06-22' },
          { student: 'سارة خالد حسن', subject: 'الفيزياء', date: '2026-06-24' },
          { student: 'محمد يوسف رضا', subject: 'اللغة العربية', date: '2026-06-27' },
        ];
        renderBookings();
      }
    })();

  })();
</script>

</body>
    </html>
