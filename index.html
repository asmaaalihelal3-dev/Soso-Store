<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل امتحانات الثالثة ثانوي – نظام متكامل</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #eef2f7 0%, #d6e0ec 100%);
      min-height: 100vh;
      padding: 2rem 1.2rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-wrapper {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 56px;
      padding: 2.2rem 2.5rem;
      box-shadow: 0 30px 50px -20px rgba(8, 20, 40, 0.35);
      border: 1px solid rgba(255,255,255,0.5);
    }

    /* header */
    .hero-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .hero-header h1 {
      font-weight: 700;
      font-size: 2.2rem;
      color: #0b1f33;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hero-header h1 i {
      background: #1e3b5a;
      color: white;
      padding: 14px 16px;
      border-radius: 60px;
      font-size: 1.6rem;
    }

    .badge-gold {
      background: #1f3349;
      color: #f5e7c8;
      padding: 10px 26px;
      border-radius: 60px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 14px -6px rgba(0,0,0,0.12);
      border: 1px solid rgba(255,215,120,0.2);
    }

    .badge-gold i { color: #f7c948; }

    /* steps indicator */
    .steps {
      display: flex;
      gap: 12px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .step {
      background: rgba(255,255,255,0.5);
      padding: 8px 22px;
      border-radius: 60px;
      font-weight: 500;
      color: #3a5a77;
      border: 1px solid #c9d8ea;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }

    .step.active {
      background: #1a334b;
      color: white;
      border-color: #1a334b;
    }

    .step i { font-size: 1rem; }

    /* grid */
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 2.2rem;
      margin-top: 0.6rem;
    }

    @media (max-width: 820px) {
      .grid-2col { grid-template-columns: 1fr; gap: 2rem; }
      .main-wrapper { padding: 1.5rem; }
    }

    .card-panel {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      border-radius: 36px;
      padding: 1.8rem 2rem 2.2rem;
      box-shadow: 0 12px 28px -12px rgba(0,20,40,0.12);
      border: 1px solid rgba(255,255,255,0.75);
    }

    .card-panel h2 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a2f44;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid rgba(200,215,232,0.5);
      padding-bottom: 1rem;
      margin-bottom: 1.8rem;
    }

    .card-panel h2 i { color: #28547a; }

    /* form */
    .input-group {
      margin-bottom: 1.4rem;
    }

    .input-group label {
      display: block;
      font-weight: 500;
      color: #1a334b;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .input-group label i {
      margin-left: 10px;
      color: #3b6b93;
      width: 22px;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #cfddee;
      border-radius: 40px;
      background: white;
      font-size: 1rem;
      transition: 0.2s;
      outline: none;
    }

    .input-group input:focus, .input-group select:focus {
      border-color: #1a4b74;
      box-shadow: 0 0 0 4px rgba(26,75,116,0.1);
    }

    .input-group select {
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%231a4b74" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: left 20px center;
      background-size: 18px;
      padding-left: 50px;
    }

    .btn-primary {
      background: #1a334b;
      border: none;
      color: white;
      width: 100%;
      padding: 16px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 6px;
      box-shadow: 0 12px 18px -8px rgba(20,40,60,0.3);
    }

    .btn-primary:hover { background: #0f2338; transform: scale(1.01); }
    .btn-primary:active { transform: scale(0.96); }

    .btn-success {
      background: #1f6d4a;
    }
    .btn-success:hover { background: #155a3b; }

    /* subject checkboxes */
    .subject-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0 8px;
    }

    .subject-check {
      background: white;
      padding: 10px 16px;
      border-radius: 30px;
      border: 1px solid #d3e0ee;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.15s;
      cursor: pointer;
    }

    .subject-check:hover { border-color: #1a4b74; background: #f5faff; }

    .subject-check input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #1a4b74;
      cursor: pointer;
    }

    .subject-check label {
      font-weight: 500;
      color: #1a2f44;
      cursor: pointer;
      flex: 1;
    }

    /* booking list */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(200,215,232,0.5);
      padding-bottom: 0.8rem;
      margin-bottom: 1.4rem;
    }

    .list-header h2 { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }

    .count-badge {
      background: #1a334b;
      color: white;
      padding: 6px 18px;
      border-radius: 60px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .booking-scroll {
      max-height: 400px;
      overflow-y: auto;
      padding-left: 4px;
    }

    .booking-scroll::-webkit-scrollbar { width: 5px; }
    .booking-scroll::-webkit-scrollbar-track { background: #d3dfed; border-radius: 20px; }
    .booking-scroll::-webkit-scrollbar-thumb { background: #2a5a7e; border-radius: 20px; }

    .booking-item {
      background: white;
      padding: 16px 18px;
      border-radius: 28px;
      margin-bottom: 12px;
      border: 1px solid #e7eef8;
      transition: 0.15s;
    }

    .booking-item:hover { border-color: #b6cde0; background: #fbfdff; }

    .booking-info { display: flex; flex-direction: column; gap: 4px; }

    .booking-title {
      font-weight: 600;
      color: #0b1f31;
      font-size: 1.05rem;
    }

    .booking-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: #3a5a77;
    }

    .booking-meta i { margin-left: 6px; color: #33638b; width: 18px; }

    .status-tag {
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-approved {
      background: #d4edda;
      color: #155724;
    }

    .booking-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .booking-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 40px;
      transition: 0.1s;
      color: #3f6483;
      border: 1px solid #d3e0ee;
    }

    .booking-actions .approve-btn {
      color: #1f6d4a;
      border-color: #9fc7b2;
    }
    .booking-actions .approve-btn:hover { background: #e1f3e9; }

    .booking-actions .delete-btn {
      color: #b1424a;
      border-color: #f0cfd2;
    }
    .booking-actions .delete-btn:hover { background: #fde7ea; }

    .empty-state {
      text-align: center;
      padding: 2.5rem 0.5rem;
      color: #4e6f8c;
    }
    .empty-state i { font-size: 3.6rem; opacity: 0.3; display: block; margin-bottom: 14px; }

    .admin-note {
      margin-top: 16px;
      padding: 14px 18px;
      background: #e8eef7;
      border-radius: 30px;
      font-size: 0.85rem;
      color: #1a3f5a;
      display: flex;
      align-items: center;
      gap: 12px;
      border-right: 4px solid #1a4b74;
    }

    @media (max-width: 460px) {
      .subject-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="main-wrapper">

  <!-- header -->
  <div class="hero-header">
    <h1><i class="fas fa-user-graduate"></i> تسجيل امتحانات الثالثة ثانوي</h1>
    <div class="badge-gold"><i class="fas fa-star"></i> 2025-2026</div>
  </div>

  <!-- steps -->
  <div class="steps">
    <span class="step active"><i class="fas fa-user"></i> بيانات الطالب</span>
    <span class="step"><i class="fas fa-layer-group"></i> اختيار القسم</span>
    <span class="step"><i class="fas fa-book"></i> تسجيل المواد</span>
    <span class="step"><i class="fas fa-check-circle"></i> انتظار الموافقة</span>
  </div>

  <!-- grid -->
  <div class="grid-2col">
    <!-- form -->
    <div class="card-panel">
      <h2><i class="fas fa-pen-fancy"></i> نموذج التسجيل</h2>
      <form id="registrationForm">
        <!-- step 1: personal -->
        <div id="stepPersonal">
          <div class="input-group">
            <label for="studentName"><i class="fas fa-user"></i> اسم الطالب (ثلاثي)</label>
            <input type="text" id="studentName" placeholder="مثال: أحمد محمد علي" required>
          </div>
          <div class="input-group">
            <label for="studentPhone"><i class="fas fa-phone-alt"></i> رقم الهاتف</label>
            <input type="tel" id="studentPhone" placeholder="05xxxxxxxx" required>
          </div>
        </div>

        <!-- step 2: major -->
        <div id="stepMajor">
          <div class="input-group">
            <label for="majorSelect"><i class="fas fa-layer-group"></i> القسم</label>
            <select id="majorSelect" required>
              <option value="" disabled selected>-- اختر القسم --</option>
              <option value="علمي">علمي (علوم + رياضيات)</option>
              <option value="ادبي">أدبي (فلسفة + تاريخ + جغرافيا)</option>
            </select>
          </div>
        </div>

        <!-- step 3: subjects (dynamic) -->
        <div id="stepSubjects">
          <label style="font-weight:500; color:#1a334b; display:block; margin-bottom:6px;">
            <i class="fas fa-book"></i> المواد الأساسية (اختر ما ترغب بتسجيله)
          </label>
          <div id="subjectCheckboxes" class="subject-grid">
            <!-- يتم ملؤها بواسطة JS -->
          </div>
          <small style="color:#3a5a77; display:block; margin-top:6px;">* يمكنك اختيار مادة أو أكثر</small>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <i class="fas fa-paper-plane"></i> إرسال الطلب
        </button>
      </form>

      <div class="admin-note">
        <i class="fas fa-shield-alt" style="font-size:1.3rem;"></i>
        <span><strong>ملاحظة:</strong> الطلب لا يُقبل إلا بعد موافقة المدير الأول. سيظهر حالة "قيد المراجعة" حتى الموافقة.</span>
      </div>
    </div>

    <!-- list -->
    <div class="card-panel">
      <div class="list-header">
        <h2><i class="fas fa-clipboard-list"></i> الطلبات المسجلة</h2>
        <span class="count-badge"><i class="fas fa-file-signature"></i> <span id="bookingCounter">0</span></span>
      </div>

      <div class="booking-scroll" id="bookingListContainer">
        <div class="empty-state" id="emptyState">
          <i class="fas fa-calendar-times"></i>
          <p>لا توجد طلبات حتى الآن</p>
          <p style="font-size:0.9rem;">قم بتسجيل طلبك الأول</p>
        </div>
        <div id="bookingList"></div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- البيانات ----------
    let requests = [];

    // المواد حسب القسم
    const subjectMap = {
      'علمي': ['الرياضيات', 'الفيزياء', 'الكيمياء', 'الأحياء'],
      'ادبي': ['اللغة العربية', 'التاريخ', 'الجغرافيا', 'الفلسفة']
    };

    // ---------- DOM ----------
    const form = document.getElementById('registrationForm');
    const studentName = document.getElementById('studentName');
    const studentPhone = document.getElementById('studentPhone');
    const majorSelect = document.getElementById('majorSelect');
    const subjectContainer = document.getElementById('subjectCheckboxes');
    const bookingListEl = document.getElementById('bookingList');
    const emptyState = document.getElementById('emptyState');
    const bookingCounter = document.getElementById('bookingCounter');

    // ---------- دالة عرض المواد حسب القسم ----------
    function renderSubjects(major) {
      subjectContainer.innerHTML = '';
      const subjects = subjectMap[major] || [];
      if (subjects.length === 0) {
        subjectContainer.innerHTML = '<p style="color:#3a5a77;">يرجى اختيار القسم أولاً</p>';
        return;
      }
      subjects.forEach(sub => {
        const div = document.createElement('div');
        div.className = 'subject-check';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = sub;
        checkbox.id = 'sub_' + sub;
        const label = document.createElement('label');
        label.htmlFor = 'sub_' + sub;
        label.textContent = sub;
        div.appendChild(checkbox);
        div.appendChild(label);
        subjectContainer.appendChild(div);
      });
    }

    // تحديث المواد عند تغيير القسم
    majorSelect.addEventListener('change', function() {
      renderSubjects(this.value);
    });

    // تحميل المواد الافتراضية (عند التحميل)
    renderSubjects('');

    // ---------- دالة عرض الطلبات ----------
    function renderRequests() {
      bookingListEl.innerHTML = '';

      if (requests.length === 0) {
        emptyState.style.display = 'block';
        bookingCounter.textContent = '0';
        return;
      }

      emptyState.style.display = 'none';
      bookingCounter.textContent = requests.length;

      // عرض الأحدث أولاً
      const sorted = [...requests].reverse();

      sorted.forEach((req, idx) => {
        const originalIndex = requests.length - 1 - idx;

        const item = document.createElement('div');
        item.className = 'booking-item';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'booking-info';

        const titleSpan = document.createElement('span');
        titleSpan.className = 'booking-title';
        titleSpan.textContent = req.student;

        const metaDiv = document.createElement('div');
        metaDiv.className = 'booking-meta';
        const statusClass = req.approved ? 'status-approved' : 'status-pending';
        const statusText = req.approved ? 'موافق عليه' : 'قيد المراجعة';
        metaDiv.innerHTML = `
          <span><i class="fas fa-phone"></i> ${req.phone}</span>
          <span><i class="fas fa-layer-group"></i> ${req.major}</span>
          <span><i class="fas fa-book"></i> ${req.subjects.join('، ')}</span>
          <span class="status-tag ${statusClass}"><i class="fas ${req.approved ? 'fa-check-circle' : 'fa-clock'}"></i> ${statusText}</span>
        `;

        infoDiv.appendChild(titleSpan);
        infoDiv.appendChild(metaDiv);

        // actions
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'booking-actions';

        // زر الموافقة (مدير)
        if (!req.approved) {
          const approveBtn = document.createElement('button');
          approveBtn.className = 'approve-btn';
          approveBtn.innerHTML = '<i class="fas fa-check"></i> قبول (مدير)';
          approveBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm(`هل توافق على طلب "${req.student}"؟`)) {
              requests[originalIndex].approved = true;
              renderRequests();
            }
          });
          actionsDiv.appendChild(approveBtn);
        }

        // زر حذف
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i> حذف';
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (confirm(`هل تريد حذف طلب "${req.student}"؟`)) {
            requests.splice(originalIndex, 1);
            renderRequests();
          }
        });

        actionsDiv.appendChild(deleteBtn);

        // إذا كان الطلب مقبولاً، نضيف زر إلغاء الموافقة (اختياري)
        if (req.approved) {
          const revokeBtn = document.createElement('button');
          revokeBtn.className = 'delete-btn';
          revokeBtn.style.borderColor = '#f0cfd2';
          revokeBtn.innerHTML = '<i class="fas fa-undo-alt"></i> إلغاء الموافقة';
          revokeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm(`إلغاء الموافقة عن طلب "${req.student}"؟`)) {
              requests[originalIndex].approved = false;
              renderRequests();
            }
          });
          actionsDiv.appendChild(revokeBtn);
        }

        item.appendChild(infoDiv);
        item.appendChild(actionsDiv);
        bookingListEl.appendChild(item);
      });
    }

    // ---------- إضافة طلب جديد ----------
    function addRequest(event) {
      event.preventDefault();

      const name = studentName.value.trim();
      const phone = studentPhone.value.trim();
      const major = majorSelect.value;
      // جلب المواد المختارة
      const checkboxes = subjectContainer.querySelectorAll('input[type="checkbox"]:checked');
      const selectedSubjects = Array.from(checkboxes).map(cb => cb.value);

      // التحقق
      if (!name || !phone || !major) {
        alert('يرجى ملء جميع الحقول: الاسم، الهاتف، القسم.');
        return;
      }
      if (selectedSubjects.length === 0) {
        alert('يرجى اختيار مادة واحدة على الأقل.');
        return;
      }

      // منع التكرار (نفس الاسم + الهاتف)
      const duplicate = requests.some(r => r.student === name && r.phone === phone);
      if (duplicate) {
        alert('يوجد طلب مسجل بنفس الاسم ورقم الهاتف. يرجى التحقق.');
        return;
      }

      // إضافة الطلب
      requests.push({
        student: name,
        phone: phone,
        major: major,
        subjects: selectedSubjects,
        approved: false   // غير موافق عليه حتى يقوم المدير بالموافقة
      });

      renderRequests();

      // إعادة تعيين النموذج
      form.reset();
      // إعادة تعيين القسم والمواد
      majorSelect.value = '';
      renderSubjects('');
      studentName.focus();

      alert('تم تسجيل طلبك بنجاح! ينتظر موافقة المدير الأول.');
    }

    // ربط الحدث
    form.addEventListener('submit', addRequest);

    // ---------- بيانات نموذجية ----------
    (function loadSample() {
      if (requests.length === 0) {
        requests = [
          { student: 'أحمد محمد علي', phone: '0555123456', major: 'علمي', subjects: ['الرياضيات', 'الفيزياء'], approved: false },
          { student: 'سارة خالد حسن', phone: '0555987654', major: 'ادبي', subjects: ['اللغة العربية', 'التاريخ'], approved: true },
        ];
        renderRequests();
      }
    })();

  })();
</script>
</body>
  </html>
